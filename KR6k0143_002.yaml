body:
  text: 明菩薩戒武林比丘廣承輯録赤城比丘廣鎬嗣法比丘大真參訂古吳比丘智旭會補九十波逸提法第五若比丘知而妄語者波逸提一象力釋子與梵志論議若不如時便違反前語若僧中問是語時復違反前語梵志譏嫌故制知而妄語者不見言見不聞言聞不觸言觸不知言知見言不見聞言不聞觸言不觸知言不知若不見聞觸知言我見聞觸知知而妄語波逸提若不見聞觸知見聞觸知想便言我不見聞觸知波逸提若不見聞觸知意中生疑彼便言我無有疑我見聞觸知波逸提若不見聞觸知意中有疑便言我無有疑我不見聞觸知波逸提若不見聞觸知意中無疑便言我有疑我不見聞觸知波逸提此應廣説本作是念我當妄語一妄語時自知是妄語二妄語已知是妄語三故妄語波逸提如是初中知後不知初不知中後知初後知中不知波逸提所見異所忍異所欲異所觸異所想異所心異如此諸事皆是妄語於大衆中知而妄語了了者波逸提不了了者突吉羅説戒時乃至三問憶念罪而不説者突吉羅比丘尼波逸提餘三衆突吉羅不犯者意有見想便説若比丘種類毀呰語者波逸提二六羣斷諍事種類罵比丘比丘慚愧忘失前後不得語故制種類毀呰人者卑姓家生行業亦卑伎術工巧亦卑汝犯過人汝多結使人汝禿盲人汝禿瞎人卑者旃陀羅種除糞種竹師種車師種卑姓者拘湊拘尸婆蘇晝迦葉阿提黎夜婆羅墮若本非卑姓習卑伎術即是卑姓卑業者販賣豬羊殺牛放鷹獵人網魚作賊捕賊守城知獄卑伎者鍛作木作陶瓦作皮韋作剃髮作簸箕作犯過者波羅夷乃至惡説結使者從瞋恚乃至五百結使盲瞎者盲瞎禿躄跛聾啞及餘衆患所加若比丘罵餘比丘言汝生卑賤家乃至汝瞎禿如是等若面罵若喻罵若自比罵面罵者言汝是旃陀羅家生除糞家生乃至汝是盲瞎禿躄跛啞聾及衆患所加人喻罵者汝似旃陀羅種乃至汝似衆患所加人自比罵者我非旃陀羅種乃至我非衆患所加人若比丘如上説種類毀呰語了了者波逸提不了了者突吉羅若以説善法而面罵喻罵自比罵説善法者阿蘭若乞食補納衣乃至坐禪人面罵者汝是阿蘭若等喻罵者汝似阿蘭若等自比罵者我非阿蘭若等了了不了了皆突吉羅比丘尼波逸提餘三衆突吉羅不犯者相利故説為法故説為律故説為教授故説為親厚故説或戲笑故説或因語次失口説或獨説夢説錯説若比丘兩舌語者波逸提三六羣傳彼此語令僧未有鬬事而生鬬已有鬬事而不滅故制兩舌者比丘鬬亂比丘比丘尼式叉摩那沙彌沙彌尼優婆塞優婆夷國王大臣外道異學沙門婆羅門如是十二衆互相鬬亂成十二句鬬亂者某甲説是言汝是旃陀羅種除糞種乃至禿盲瞎跛躄聾啞説而了了者波逸提不了了者突吉羅比丘尼波逸提餘三衆突吉羅不犯者破惡知識破惡伴黨破方便壞僧者破助壞僧者破二三人作羯磨者破作非法非律羯磨者破數數語無義無利欲方便作無義利者若比丘與婦女同室宿者波逸提四阿那律至無住處村寄宿淫女家門下有諸長者亦來投宿坐相逼近淫女愍念尊者令入舍內尊者趺坐繫念在前淫女初夜來求作夫默然不答亦不觀視後夜淫女復脫衣前捉之尊者踊身空中淫女慚愧著衣懺悔尊者下在本處説微妙法淫女得法眼淨受皈戒為優婆夷次日尊者受供説法而去還寺向衆僧説少欲者譏嫌白佛結戒填婦女者人女有知命根不斷室者有四周牆壁障上有覆或前敞而無壁或有雖覆而不遍或雖覆遍而有開處若比丘先宿婦人後至或婦人先至比丘後到或二人俱至若欹側臥隨脅著地波逸提隨轉側波逸提若與天女龍女阿修羅女夜叉女餓鬼女畜生女能變化不能變化同室宿者突吉羅若與黃門二根同室宿者突吉羅若晝日婦女立比丘臥者突吉羅比丘尼波逸提餘三衆突吉羅不犯者不知有婦女或室有覆無障或盡覆半障或盡覆少障或盡障不覆或盡障少覆或半覆半障或少覆少障或不覆不障或復露地若此室中行坐若頭眩倒地若病臥或為強力所捉若為人所縛命難淨行難若比丘與未受大戒人共宿過二宿至三宿波逸提五六羣與諸長者共在講堂止住一比丘散心睡眠轉側露形有比丘以衣覆之復更轉側露形如是至三長者譏嫌調弄故制後諸比丘以羅云未受大戒遣出羅云往廁止宿世尊知之詣廁引入自房共止一宿乃聽比丘與未受大戒人共二宿若至三宿明相未出時應避去若至第四宿若自去若使彼去未受大戒人者除比丘比丘尼餘未受大戒人是犯不犯同上比丘尼波逸提若比丘與未受戒人共誦者波逸提六六羣與諸長者共在講堂誦佛經語聲高大如婆羅門誦書聲亂諸坐禪者故制句義非句義句味非句味字義非字義句義者與人同誦不前不後諸惡莫作衆善奉行自淨其意是諸佛教非句義者如一人説諸惡莫作未竟第二人抄前言諸惡莫作句味者二人共誦不前不後眼無常乃至意無常非句味者如一人未稱眼無常第二人抄前言眼無常字義者二人共誦不前不後阿羅波遮那非字義者如一人未稱言阿第二人抄前言阿法者佛所説聲聞所説仙人所説諸天所説若比丘與未受戒人共誦一説二説三説若口授了了者波逸提不了了突吉羅天子阿修羅子夜叉子龍子乾闥婆子畜生能變化者一説二説三説了了不了了突吉羅若師不教言我説竟汝可説者師突吉羅比丘尼波逸提餘三衆突吉羅不犯者我説竟汝説一人誦竟一人書若二人同業同誦等若比丘知他有粗惡罪向未受大戒人説除僧羯磨波逸提七有波利婆沙摩那埵比丘在下行坐六羣語諸白衣此等犯如是事故罰在下行坐有過比丘及餘比丘皆慚愧白佛結戒時比丘或不知粗惡不粗惡後方知粗惡或作波逸提懺或畏慎佛言不知無犯又舍利弗為僧所差在王衆人民衆中説調達過生畏慎心佛言僧差無犯粗惡罪者波羅夷僧殘僧者一羯磨一説戒若説了了波逸提不了了突吉羅除粗罪更以餘罪向未受六戒人説突吉羅自犯粗罪向未受大戒人説突吉羅除比丘比丘尼以餘人粗惡罪向未受大戒人説突吉羅粗惡罪粗惡罪想波逸提粗惡罪疑非粗惡罪粗惡罪想非粗惡罪疑突吉羅比丘尼波逸提餘三衆突吉羅不犯者若不知若衆僧差若粗惡罪非粗惡罪想若白衣先已聞此粗惡罪若比丘向未受戒人説過人法言我見是我知是實者波逸提八緣起同第四大妄語戒上人法者諸法出要自言得身念善思惟有戒有欲有不放逸有精進有定有正定有道有修行有智慧有見有得有果若真實有此向未受大戒人説了了者波逸提不了了者突吉羅若手印書若作知相若遣人了了波逸提不了了突吉羅若向天子阿修羅子等受大戒非同意者説突吉羅比丘尼波逸提餘三衆突吉羅不犯如四棄中説若比丘與女人説法過五六語除有知男子波逸提九迦留陀夷於長者家在姑前與兒婦耳語説法姑見生疑故制是後比丘不敢為女人説法故開聽五語者色無我受想行識無我六語者眼無常耳鼻舌身意無常有知男子者解粗惡不粗惡事犯輕重如上説比丘尼波逸提餘三衆突吉羅不犯者若五六語有知男子前過説若無有知男子前授優婆夷五戒及説五戒法授八關齋法説八關齋法若説八聖道十不善法及女人問義應答若不解得廣為説若比丘自手掘地若教人掘者波逸提十六羣修佛講堂繞堂自掘地長者譏嫌斷他命根故制乃更教人言掘是置是長者復譏佛更結戒地者已掘地未掘地若已掘地經四月被雨漬還如本若用鋤或钁斫或椎打或鎌刀刺刀乃至指爪掐傷地打橛入地地上然火一切波逸提地有地想波逸提若不教言看是知是突吉羅比丘尼波逸提餘三衆突吉羅不犯者若語言知是看是若曳竹木若籬倒地扶正若反磚石取牛屎取崩岸土若取鼠壤土若除經行處土若除屋內土若來往經行若掃地若杖築地若不故掘若比丘壞神鬼村波逸提十一有一曠野比丘修治屋舍故自斫樹故制鬼者非人是村者一切草木是若斫截墮故名壞村有五種根種枝種節生種覆羅種子種若生生想自斷教他斷若自炒教他炒自煮教他煮波逸提若生疑生非生想非生生想非生疑自斷教他斷自炒教他炒自煮教他煮突吉羅若打橛著樹上若以火著生草木上若斷多分生草木波逸提斷半乾半生草木突吉羅若不言看是知是突吉羅比丘尼波逸提餘三衆突吉羅不犯者言看是知是若斷枯乾草木若于生草木上曳材曳竹正籬障若撥磚石若取牛屎若生草木覆道以杖披遮令開若以瓦石拄之而斷草木若除經行地土若掃經行處地誤撥斷生草木若復以杖築地誤撥斷生草木若比丘妄作異語惱他者波逸提十二闡陀犯罪諸比比問之即以餘事報言汝向誰語為説何事為論何理為語戒為語誰耶是誰犯罪罪由何生我不見罪云何言我有罪時諸比丘譏嫌白佛佛令僧為作餘語白二羯磨乃結戒云若比丘餘語者波逸提是後闡陀因不作餘語便觸惱衆僧喚來不來不喚來便來應起不起不應起便起應語不語不應語便語佛聞更結此戒餘語者僧未作白便作餘語突吉羅若作白已如是語者盡波逸提觸惱者若未作白喚來不來等盡突吉羅白已如此盡波逸提若上座喚來不來突吉羅比丘尼波逸提餘三衆突吉羅不犯者重聽不解前語有參差故似餘語若欲為作非法非毗尼無利益羯磨若一坐食不作餘食法食若病乃至命難梵行難等故似惱觸若比丘嫌罵波逸提十三沓婆摩羅子知僧臥具及差僧食慈地於眼見耳不聞處言其有愛恚怖癡故制後更于耳聞眼不見處言其有愛等乃更結戒若面見譏嫌若背面罵詈了了者波逸提不了了突吉羅若上座教嫌罵受教嫌罵突吉羅比丘尼波逸提餘三衆突吉羅不犯者其人實有愛恚怖癡恐後有悔恨語令如法發露若戲語乃至錯説若比丘取僧繩床木床若臥具坐褥露地敷若教人敷捨去不自舉不教人舉波逸提十四有長者飯僧十七羣取僧坐具露地敷而經行望食時到時到已不收攝便赴食僧坐具為風塵土坌蟲鳥啄壞汙穢不淨故制繩床者有五種旋腳直腳曲腳入陛無腳木床亦爾臥具者或用坐或用臥褥者用坐也若比丘以僧繩床木床臥具坐褥在露地敷若教人敷去時若彼有舊住比丘若摩摩帝若經營人當語言我今付授汝汝應守護看若都無人者當舉著屏處而去若無屏處自知此處必無破壞當安隱持粗者覆好者上而去若即時得還便應去若疾雨疾還不壞坐具者應往若中雨中行及得還者應往若少雨少行及得還者應往彼比丘應次第作如是方便去若不作如是方便而行初出門波逸提若一足在門外一足在門內意欲去而不去還悔盡突吉羅若二人共一床坐下座應收而去下座意謂上座當收而上座不收下座波逸提復以非威儀故突吉羅上座意謂下座當收而下座不收上座波逸提若二人不前不後俱不收俱波逸提若空繩床木床踞床若凡浴床若地敷若臥具表裏若取繩索毳紵放在露地不收便去盡突吉羅若敷僧臥具在露地不收而入房坐思惟突吉羅比丘尼波逸提餘三衆突吉羅不犯者若勢力所縛命難梵行難若比丘於僧房中敷僧臥具若自敷若教人敷若坐若臥去時不自舉不教人舉波逸提十五有客比丘語舊住我在邊僧房中敷臥具宿後不語舊住便去僧臥具爛壞蟲囓色變舊住因不見客比丘到房看之見是事已白佛結戒彼比丘僧房中敷僧臥具若自敷教人敷若坐若臥去時若有舊住比丘若經營人摩摩帝當語彼言與我掌護牢舉若無人付授不畏失壞當移床離壁高支床腳持枕褥臥具置裏以餘臥具覆上而去若恐壞敗當取枕褥臥具置衣架上竪床而去若不如是而去出界外波逸提一足在內一足在外悔而不去若期去不去盡突吉羅若即還不久二宿在界外至第三宿明相未出若自往到房若遣使往語摩摩帝若知事人汝掌護此物作摩摩帝不如是者波逸提比丘尼波逸提餘三衆突吉羅不犯者若房舍壞崩乃至命難等若水道留難盜賊惡獸水漲被繫不得自往不使人語若比丘知先比丘住處後來強於中間敷臥具止宿念言彼若嫌迮者自當避我去作如是因緣非餘非威儀波逸提十六六羣及十七羣行至無住處村十七羣語六羣汝是我等上座應先求住處六羣報言汝等自去我不求住處時十七羣即求住處自止宿六羣乃往語言汝等起當以大小次第止十七羣不允即強敷臥具止宿故制不知無犯如前説中間者若頭邊若腳邊脅邊臥具者草敷葉敷下至地敷臥具若比丘知他比丘先得住處後來強於中間敷臥具止宿隨轉側脅著床波逸提比丘尼波逸提餘三衆突吉羅不犯者先不知若語已住若先與開門若寬廣不相妨礙若有親舊人教言但於中敷我自語主若倒地若病轉側墮上若被繫命難梵行難若比丘瞋他比丘不喜僧房舍中若自牽出教他牽出波逸提十七亦六羣與十七羣事故制隨所牽人多少隨出戶多少一一波逸提若持他物出若持物擲戶外若閉他人在戶外盡突吉羅比丘尼波逸提餘三衆突吉羅不犯者無瞋恨心隨次第出若共宿二夜至第三夜遣未受戒人出若破戒破見破威儀若為他所舉所擯若應擯以是因緣故有命難梵行難驅逐無犯若比丘若房若重閣上脫腳繩床木床若坐若臥波逸提十八有比丘住重閣上坐脫腳床坐不安詳床腳下脫打在下止宿比丘身傷血出故制房者若僧房若私房重閣者立頭不至上者是脫腳床者腳入陛比丘在重閣上於脫腳床若坐若臥隨脅著床轉側波逸提若在獨坐床一板床浴床若坐若臥突吉羅比丘尼波逸提餘三衆突吉羅不犯者若坐旋腳直腳曲腳無腳繩床若床支大若脫腳床安細腰若彼重閣上有板覆若刻木作花覆若重厚覆若反床坐若脫床腳坐若比丘知水有蟲若自洗泥若草若教人澆者波逸提十九闡陀起大屋以蟲水和泥教人和長者嫌責故制若知水有蟲以草若土擲其中者波逸提除水已若有蟲酪漿清酪漿若醋若漬麥漿以用澆泥澆草若教人者波逸提若以土若草著有蟲清酪中醋中漬麥漿中若教人者波逸提若蟲水蟲水想波逸提蟲水疑無蟲水蟲水想無蟲水疑突吉羅比丘尼波逸提餘三衆突吉羅不犯者不知有蟲作無蟲想若蟲大以手觸水令去若漉水灑地若教人灑若比丘作大房舍戶扉窗牗及餘莊飾具指授覆苫齊二三節若過波逸提二十闡陀起大房覆有餘草復更重覆三猶不止屋便摧破居士嫌責故制大舍者多用物及餘莊飾者刻鏤采畫覆有二種縱覆橫覆彼比丘指授二節覆已第三節覆未竟當去至不見不聞處若不去第三節竟波逸提若捨聞處至見處捨見處至聞處突吉羅比丘尼波逸提餘三衆突吉羅不犯者若水陸道斷盜賊惡獸水漲被繫命難梵行難不去至不見不聞處若比丘僧不差教戒比丘尼者波逸是二十一大愛道請佛聽諸比丘與尼教戒説法佛敕阿難隨次差上座往時六羣自往教戒不説正法惟説一切世論等大愛道白佛佛制僧中差教授尼人白二羯磨於是六羣即出界外更互相差大愛道重白佛佛制成就十法然後得教授尼戒律具足多聞誦二部戒利決斷無疑善能説法族姓出家顏貌端正尼衆見便歡喜堪任與尼衆説法勸令歡喜不為佛出家而被法服犯重法若滿二十歲若過二十歲如此等可與尼教戒遂結此戒僧者一説戒一羯磨差者僧中所差白二羯磨教授者八不可違法一者百臘比丘尼見初夏比丘當起迎逆問訊禮拜請令坐此法應尊重恭敬讚歎盡形壽不應違二者比丘尼不得罵比丘不得誹謗言破戒破見破威儀餘如前説下皆爾三者比丘尼不得舉比丘罪言汝所作爾汝所作不爾不得作自言不得遮他覓罪不得遮他説戒自恣尼不得説比丘過失比丘得説尼過失四者已學于學式叉摩那從衆僧求受大戒五者若比丘尼犯重法應半月在二部僧中行摩那埵六者比丘尼應于半月當從僧求教授人七者比丘尼不應在于無比丘處結夏安居八者比丘尼夏安居訖當詣衆僧求三事見聞疑自恣若於説戒時上座當問比丘尼遣何人來耶若有即起白言比丘尼僧和合禮比丘僧足求索教戒上座應更問言誰為教戒比丘尼者若有應差若教戒者多應遣使語尼言此中多有教戒人汝為請誰耶若彼尼言我請某人若復報言我隨僧處分者僧應隨常教授尼者次第差之比丘僧應剋時到比丘尼亦尅時迎若尅時不至若至時不迎俱突吉羅若聞教授師來比丘尼當出半由旬迎供給所須辦沐浴具作諸飲饌若不作如是供辦者突吉羅若僧不差或非教授日而往與説八不可違法者突吉羅若僧不差而往與説法者波逸提若比丘僧病應遣人禮拜問訊僧不和合衆不滿足應遣人禮拜問訊若尼僧病不和合不滿足亦應遣人禮拜問訊比丘僧若不爾者突吉羅若比丘為僧差教授比丘尼乃至日沒者波逸提二十二難陀好音聲為尼説法聽者樂聞遂至日暮尼出祗園入城城門已閉即依城塹中宿晨旦門開在前入城諸長者謗為與比丘宿故制除教授若受經誦經問經及以餘事乃至日暮突吉羅除比丘尼若為餘婦女誦經等至日暮突吉羅若日暮日暮想波逸提日暮疑日暮不日暮想不日暮日暮想不日暮疑突吉羅不犯者若船濟處説法比丘尼往聽若與賈客行夜間説法若至尼寺中説法若説戒日來請教授人值説法便聽若比丘語諸比丘如是語比丘為飲食故教授比丘尼者波逸提二十三尼聞教授師來半由旬迎安處房舍辦飲食床座浴處時六羣不被差心生嫉妬作如是言故制説了了波逸提不了了突吉羅餘四衆突吉羅不犯者其事實爾若戲語獨語夢語錯語若比丘與非親里比丘尼衣除貿易波逸提二十四舍衛城一乞食比丘威儀具足時有尼見便生善心數請彼比丘比丘不受異時衆僧分衣物此比丘持衣分出祗桓門見此尼來即以與之意彼不受尼輒便受比丘數數向人嫌責故制貿易者以衣易衣以衣易非衣等餘四衆突吉羅不犯者與塔與佛與僧若比丘與非親里比丘尼作衣者波逸提二十五迦留陀夷為一尼作衣乃作男女行欲像襞衣與之語言不得妄解披看亦莫示人若白時到當著此在尼僧後行尼如其教居士見而譏笑故制隨刀截多少波逸提隨一縫一針波逸提若披看牽挽尉治以手捫摩若捉角頭挽方正安帖緣索線續線盡突吉羅餘四衆突吉羅不犯者與僧作若為塔若借著浣染治還主若比丘與比丘尼在屏處坐者波逸提二十六迦留陀夷至偷蘭難陀所在門外共一處坐居士譏嫌故制若盲而不聾聾而不盲突吉羅立住者突吉羅餘四衆突吉羅不犯者若比丘有伴若有智人若行過卒倒地若病轉倒或力勢所持若被繫閉命難梵行難若比丘與比丘尼期同道行從一村乃至一村除異時波逸提異時者與估客行若疑畏怖時是謂異時二十七六羣與六羣尼人間遊行居士嫌之故制於是道路卒相遇者畏慎不敢共行佛言不期無犯又衆比丘及尼從舍衛國至毗舍離以不得同行諸尼在後為賊所劫故更開異時期者言共去至某村某城某國土道者村間有分齊行處是若與尼期行乃至村間分齊處隨衆多少界多少一一波逸提非村若空處行乃至十里波逸提若減一村減十里突吉羅若多村間同一界行突吉羅方便欲去共期莊嚴盡突吉羅餘四衆突吉羅不犯者力勢所持若被繫命難梵行難若比丘與比丘尼共期同乘一船上水下水除直渡者波逸提二十八緣起同前直渡者有衆比丘及尼欲渡恆水諸尼在後暴雨水漲船未還日已暮為賊所劫故開若期同乘一船上水下水入船裏波逸提一腳在船上方便欲入而不入共期莊嚴一切突吉羅餘四衆突吉羅不犯者不共期若直渡彼岸入船船師失濟上水下水若力勢所持被繫命難梵行難若比丘知比丘尼讚歎教化因緣得食食除檀越先有意者波逸提二十九舍衛城有居士請舍利弗目連飯食偷蘭難陀謗為下賤人讚提婆達等為龍中之龍頃舍利弗目連至即言龍中之龍已至居士訶之二人食已還白世尊乃訶責提婆達部黨結戒是後比丘不知有勸化無勸化佛言不知無犯又羅閲城有大長者與梨師達親善待其初至供養衆僧後梨師逢至城有尼往語長者因即設齋梨師達恐犯此戒不受食故更開檀越先有意者教化者阿練若乞食人著糞掃衣作餘食法不食一坐食一摶食冢間坐露地坐樹下坐常坐隨坐持三衣讚偈多聞法師持律坐禪也食者從旦至中得食彼比丘知尼教化得食食咽咽波逸提得餘襯體衣燈油塗足油盡突吉羅教化教化想波逸提教化疑不教化教化想不教化疑突吉羅餘四衆突吉羅不犯者若教化無教化想若尼自作若檀越令尼經營若不故教化而乞食與若比丘與婦女共期同一道行乃至村間波逸提三十有毗舍離女嫁舍衛國人與姑共諍還詣本國時阿那律從舍衛國至毗舍離彼婦女欲隨行尊者許之夫主追至打尊者幾死尊者下道靜處趺坐入火光三昧夫主待其定起禮拜懺悔尊者乃為説法而去還告衆僧白佛結戒不期無犯因緣如前犯輕重如前餘四衆突吉羅若比丘施一食處無病比丘應一食若過受者波逸提三十一拘薩羅國有無住處村居士為比丘作住處止聽一食六羣至彼得美飲食復住第二宿乃至于此數數食居士譏嫌故制後舍利弗於彼處得病恐犯戒扶病去遂增劇故更增無病之言住處者在中一宿食者乃至食時病者離彼村增劇者是若無病過受食咽咽波逸提受餘襯身衣然燈油塗足油盡突吉羅比丘尼波逸提餘三衆突吉羅不犯者若諸居士請大德住此我當與食我等為沙門釋子故設此宿處供給飲食若不得沙門釋子亦當與餘人耳若檀越次第請食若男女弟妹次第請食或今日受此人食明日受彼人食若水瀑漲乃至梵行難等若比丘展轉食除餘時波逸提餘時者病時施衣時是謂餘時三十二有沙䨲婆羅門載五百車飲食隨佛伺空設供而不得便佛聽作餅粥供僧時諸居士聞佛聽僧食粥及餅皆大歡喜有一少信大臣見佛僧大得供養生福田想辦肥美食請僧僧先食濃粥不能多食大臣嫌之又羅閲城一少信樂師其事亦爾佛乃結戒於是諸病比丘所請食處無隨病食及藥若有隨病食及藥畏慎不敢食佛聽病比丘展轉食又一居士既請佛僧復有居士亦請佛僧施食及衣比丘畏慎白佛佛聽施衣時展轉食濃粥者以草畫之不合不得食展轉食者請也請有二種若僧次請別請也食者飯乾餅魚肉病者不能一坐食好食令足施衣者自恣竟無迦絺那衣一月有迦絺那衣五月若復餘時施食及衣若一日得多請應自受一請餘者當施人如是施與長老我應往彼今布施汝若比丘不捨前請受後請食咽咽波逸提不捨後請受前請食咽咽突吉羅餘四衆突吉羅不犯者若請與非食或食不足或無請食者或食已更得或一處有前食後食若比丘別衆食除餘時波逸提餘時者病時作衣時施衣時道行時乘船時大衆集時沙門施食時此是時三十三提婆達惡名流布利養斷絶與五比丘俱家家乞食故制別衆食者若四人若過四人病者下至腳跟躄作衣時者自恣竟無迦絺那衣一月有迦絺那衣五月乃至衣上作馬齒一縫施衣時如上説道行者下至半由旬內有來者有去者乘船亦爾大衆集者食足四人長一人為患五人十人乃至百人長一人為患沙門施食者在此沙門釋子外諸出家者及從外道出家者是若比丘無別衆食因緣即當起白言我於此別衆食中無因緣欲求佛出佛言聽出若餘人無因緣亦聽使出若二人三人隨竟食若四人若過四人應分作二部更互入食若有別衆食因緣欲入尋即當起白隨上座次入若比丘別衆食咽咽波逸提若有因緣不説者突吉羅比丘尼波逸提餘三衆突吉羅若比丘至白衣家請比丘與餅飯若比丘欲須者當二三鉢受還至僧伽藍中應分與餘比丘食若比丘無病過兩三鉢受持還至僧伽藍中不分與餘比丘食者波逸提三十四有已嫁女還父母家施比丘食其夫呼還因諸比丘盡取其食方更辦具未還之間其夫已更取婦又衆商賈車伴其止宿有比丘于一信樂商賈處得食展轉告餘比丘乞令食盡彼更市糧諸伴已去不及道路為賊所劫故制白衣家者有男有女若比丘至白衣家請與餅飯當問言為是歸婦食為是商賈道路糧若言歸婦食賈客道路糧者即應食已出還僧伽藍中白諸比丘某甲家有歸婦食有賈客道路糧若欲食者食已應出若欲持還齊二三鉢若持一鉢還與諸比丘分食之當語餘比丘言某甲家有歸婦食賈客道路糧若至彼家者即於彼食若持還應取兩鉢我已持一鉢還若持兩鉢還分食之復與諸比丘言某甲家有歸婦食賈客道路糧若至彼家者即於彼食若欲持還應取一鉢我已持兩鉢還若盡持三鉢還當語言可於彼食勿更持還我今已持三鉢來若比丘無病出彼門波逸提若一足門內一足門外方便欲去而還住者突吉羅若不問歸婦食賈客道路糧而取食若持還不分與餘比丘而獨食若不語餘比丘盡突吉羅比丘尼波逸提餘三衆突吉羅不犯者若彼自送至僧伽藍若復自送至比丘尼寺若比丘足食竟或時受請不作餘食法而食者波逸提三十五世尊讚歎一食法比丘奉行體色枯悴佛聽一坐食乃至飽足更聽食飯等五種食令飽足又聽病比丘數數食因棄餘食衆鳥爭鳴又聽瞻病人食殘食及聽取所受食作餘食法又聽諸比丘從彼處持食還作餘食法而食之當作如是餘食法言大德我足食已知是看是此作餘食法彼應取少許食已語言我止汝取食之是名餘食法時有一比丘貪餮不知足食不足食不知餘食不餘食得便食之故制有五種足食知是飯知持來知遮知威儀知捨威儀足食已捨威儀不作餘食法得而食之咽咽波逸提佉闍尼食者有五種謂根食枝食葉食華食果食油胡黑石蜜磨細末食若比丘足食已不作餘食法得而食之咽咽波逸提若比丘足食已為他作餘食法不成餘食法突吉羅若知他足食向之作餘食法若自手捉食作餘食法若持食置地作若令淨人持食作若淨人前作若以不好食覆好食上作若受他餘食法盡持去皆不成餘食法突吉羅若足食足食想波逸提足食疑不足食足食想不足食疑突吉羅餘四衆突吉羅不犯者若食作非食想不受作餘食法非食不作餘食法若與他他與己作餘食法若病若病人殘食不作餘食法若比丘知他比丘足食已若受請不作餘食法殷勤請與食長老取是食以是因緣非餘欲使他犯波逸提三十六貪餮比丘為他所訶心懷恚恨以此故令他犯故制若彼即受食之咽咽二俱波逸提若彼不食棄之或舉置若轉與餘人或作餘食法而食之與者突吉羅若與病人食欲令他犯突吉羅若作餘食法已與他欲使他犯突吉羅若足食足食想波逸提足食疑不足食足食想不足食疑突吉羅不犯者若先不知若足食不足食想若與令棄而食之若令舉置而食之若令遣與人取而食之若與令作餘食法而食彼自不作若持病人餘食與不令他犯若作餘食法而與不令他犯若比丘非時受食食者波逸提三十七難陀跋難陀瞻看伎樂衆人與之飲食食畢故看向暮方還迦留陀夷日暮乞食一娠婦持食出值天雷電暫見其面怖稱是鬼即便墮身恚言沙門釋子寧破腹不應夜乞食故制時者明相出乃至日中按此時為法四天下食亦爾非時者從日中乃至明相未出若非時受食咽咽波逸提若非時過非時若七日過七日波逸提盡形壽藥無因緣服者突吉羅非時非時想波逸提非時疑非時時想時非時想時疑突吉羅比丘尼波逸提餘三衆突吉羅不犯者時有乞食比丘見他作黑石蜜中有罽尼不敢非時噉佛言聽噉無犯作法應爾有病比丘服吐下藥比粥熱頃日時已過應煮麥令皮不破漓汁飲之若比丘殘宿食而食者波逸提三十八尊者迦羅常坐禪思惟時乞食易得乃作是念何為日日入城乞食疲苦寧可食先得者後得食當持還即如所念諸比丘於小食大食時不見迦羅疑是命終遠行等後見乃問知其故白佛結戒宿食者今日受已至明日於一切沙門釋子受大戒者皆不清淨若比丘舉宿食而食咽咽波逸提宿作宿想波逸提宿疑非宿宿想非宿疑突吉羅比丘尼波逸提餘三衆突吉羅不犯者宿受食有餘與父母與塔作人與作房舍人計價與食直後從作人邊乞食得食鉢有孔罅食入其中彼摘洗恐穿壞如法洗已餘不出者無犯若宿受蘇油脂用灌鼻若縮鼻時蘇油隨唾出應棄之餘無犯若比丘不受食若藥著口中除水及楊枝波逸提三十九有一比丘常乞食著糞掃衣時城中居士為命過父母等於四衢或廟中作祭祀供養彼比丘自取食之居士譏嫌故制時諸比丘不敢自取楊枝淨水佛言不犯受者有五種手與手受或手與持物受若持物與手受若持物與持物受若遙過物與與者受者俱知中間無所觸礙得墮手中復有五種受若身與身受若衣與衣受若曲肘與曲肘受若器與器受若有因緣置地與不與食自取著口中咽咽波逸提若不受不受想波逸提不受疑受不受想受疑突吉羅比丘尼波逸提餘三衆突吉羅不犯者乞食比丘鳥銜食墮鉢中若風吹墮鉢中欲除去此食乃至一指爪可除去餘者不犯若得好美飲食乳酪魚及肉若比丘如此美飲食無病自為己索者波逸提四十跋難陀詣一商主家索雜食商主問有何患報言無所患苦但意欲得雜食耳商主譏嫌故制若無病為自乞美食咽咽波逸提餘四衆突吉羅不犯者若有病自乞若為病人乞乞得而食或己為他他為己乞或不乞而得若比丘外道男外道女自手與食者波逸提四十一佛敕阿難與衆僧分餅分已有餘乃與乞人有一裸形外道家女顏貌端正阿難付餅餅黏相著謂是一餅與此女人女與傍人轉問所得即生疑謗又一梵志在此食已向拘薩羅國道逢篤信相士告以從禿頭居士得食相士以白比丘佛聞結戒於是外道皆有怨言佛乃聽置地與使人與外道者裸形異學之人若自手與受者波逸提若與而不受突吉羅若方便欲與而不與還變悔者突吉羅餘四衆突吉羅不犯者若與父母與塔作人別房作人計作食價與若勢力強奪若比丘先受請已前食後食詣餘家不囑授餘比丘除餘時波逸提餘時者病時作衣時施衣時是謂時四十二有長者與跋難陀親善設食請僧待跋難陀至彼小食時更詣餘家時垂欲過方來諸比丘飲食不得滿足又一大臣送甘果至寺亦待跋難陀來分彼後食已方詣餘家時過乃還使衆僧不得食新果故制是後衆僧不敢入城受請佛聽相囑授入城又以因緣聽病時等不囑授入城前食者明相出至食時是後食者從食時至日中是家者有男女所居餘比丘者同一界共住作衣施衣時如上説若比丘囑授欲詣村而中道還失前囑授後若欲去當更囑授若囑授欲詣村而不至所囑授處更詣餘家失前囑授欲往應更囑若囑授至白衣家乃至庫藏處及聚落邊房若至尼寺若即白衣家還出失前囑授欲往應更囑若比丘先受請已前食後食詣餘家不囑授比丘入村波逸提若一足門內一足門外方便莊嚴欲去不去突吉羅比丘尼波逸提餘三衆突吉羅不犯者若無比丘不囑授至庫藏聚落邊房若至尼寺至所囑白衣家若衆多家敷坐具請比丘或為勢力所持命難梵行難若比丘在食家中有寶強安坐者波逸提四十三迦留陀夷至齋優婆夷家坐其夫須問何等報言須食即使婦出食與之食已不去其夫瞋恚而出語言隨汝所為佛聞故制食者男以女為食女以男為食故名為食家寶者金銀等七寶若比丘在食家中有寶強安坐者波逸提盲而不聾聾而不盲立而不坐皆突吉羅比丘尼波逸提餘三衆突吉羅不犯者有二比丘有伴若有識別人或有客人在一處或從前過不住或卒病發倒地或為力勢者所持或被繫閉或命難梵行難若比丘食家中有寶在屏處坐者波逸提四十四迦留陀夷更在戶扇後坐與齋優婆夷共語故制彼食家中坐使舒手得及戶令乞食比丘見餘如前説若比丘獨與女人露地坐波逸提四十五亦起自前人故制犯不犯悉同前説若比丘語餘比丘如是語大德共至聚落當與汝食彼比丘竟不教與是比丘食語言汝去我與汝一處若坐若語不樂獨坐獨語樂以此因緣非餘方便遣去波逸提四十六跋難陀與餘比丘共鬪結恨在心異時將至無食處周回遍行餘有少時乃語言汝是大惡人由汝故并使我不得食汝速去彼比丘出城到祗園時已過不得食乏極諸比丘嫌責白佛結戒食者時食也彼方便遣去捨見處聞處波逸提捨見處至聞處捨聞處至見處突吉羅方便自捨見聞處波逸提捨見處至聞處捨聞處至見處突吉羅比丘尼波逸提餘三衆突吉羅不犯者與食遣去若病若無威儀人見不喜者語言汝去我當送食至僧伽藍中彼若破戒破見破威儀若衆中所舉若被擯若應擯若見命難淨行難方便遣去不以嫌恨故遣去若比丘受四月請與藥無病比丘應受若過受除常請更請分請盡形壽請波逸提四十七摩訶男供衆僧藥恭敬上座施與好者求亦與不求亦與六羣詣其家故求難得藥報言有者當相與無者當詣市求買相給六羣即以有愛及妄語訶之摩訶男因不復供僧藥故結此戒四月者夏四月病者醫所教服藥也常請者其人作如是言我常與藥更請者斷已後更請與分請者持藥至僧伽藍中分與盡形壽請者其人言我當盡形壽與藥請者有四種或有請夜有限齊藥無限齊彼作夜分齊不作藥分齊我與如許夜藥或有請藥有分齊夜無分齊彼作藥分齊不作夜分齊作如是言我與如是藥或夜有分齊藥有分齊彼如是言爾許夜與如是藥或夜無分齊藥無分齊作如是言我請汝與藥是中請夜有分齊藥無分齊夜有分齊藥有分齊應夏四月受夜無分齊藥有分齊夜無分齊藥無分齊應隨施時受若無病過受除常請更請分請盡形壽請咽咽波逸提比丘尼波逸提餘三衆突吉羅若比丘往觀軍陳除時因緣波逸提四十八波斯匿王自領六軍征伐反叛六羣往觀王不悅因寄石蜜問訊世尊世尊訶責結戒後有二大臣在軍中渴仰欲見比丘比丘不敢往故除時因緣陳者若戲若鬬軍者象軍馬軍車軍步軍比丘往觀軍陳從道至道從道至非道從非道至道從下至高從高至下去而見者波逸提不見者突吉羅若方便莊嚴欲觀而不去者突吉羅若比丘先在道行軍陳後至應下道避不避者突吉羅比丘尼波逸提餘三衆突吉羅不犯者或力勢者將去若水陸道斷乃至梵行難等不下道避若比丘有因緣聽至軍中二宿三宿過者波逸提四十九六羣有因緣至軍中宿居士譏嫌故制若至第三宿明相未出時應離聞處見處若不離聞見處至明相出時波逸提若離見處至聞處離聞處至見處突吉羅比丘尼波逸提餘三衆突吉羅不犯者若水陸道斷乃至梵行難等若比丘二宿三宿軍中住或時觀軍陳鬬戰若觀遊軍象馬力勢者波逸提五十六羣看軍陳為箭所射同以衣裏之與還居士問知譏嫌故制鬬者若戲鬬若真實鬬軍者一種軍乃至四種軍或有王軍賊軍居士軍力勢者第一象力第一馬力第一車力第一步力陳者四方陳圓陳半月陳張甄陳函相陳象王馬王人王犯不犯悉如上説若比丘飲酒者波逸提五十一婆伽陀尊者借宿辮髮梵志家降毒火龍拘睒彌主心生篤信因而覲禮世尊復欲供養尊者六羣為索黑酒尊者醉飽中路倒吐衆烏亂鳴佛訶云如今不能降伏小蛇況能降伏大龍凡飲酒者有十過失一者顏色惡二者少力三者眼視不明四者現瞋恚相五者壞田業資生法六者增致疾病七者益鬬訟八者無名稱惡名流布九者智慧減少十者身壞命終墮三惡道自今已後以我為師者乃至不得以草木頭內著酒中而入口酒者木酒粳米酒餘米酒大麥酒若有餘法作酒者是木酒者梨汁酒閻浮果酒甘蔗酒舍樓伽果酒蕤汁酒蒲桃酒梨汁酒者以蜜石蜜雜作乃至蒲桃酒亦復如是雜酒者酒色酒香酒味或非酒色酒香酒味或非酒色非酒香酒味或非酒色非酒香非酒味俱不應飲若非酒酒色酒香酒味或非酒色酒香酒味或非酒色非酒香酒味或非酒色非酒香非酒味俱應飲若比丘若酒酒煮酒和合若食若飲者波逸提若飲甜味酒醋味酒若食麴食酒糟俱突吉羅若酒作酒想若酒疑若酒非酒想俱波逸提若非酒酒想若非酒疑俱突吉羅比丘尼波逸提餘三衆突吉羅不犯者若有如是病餘藥治不瘥以酒為藥若以酒塗瘡若比丘水中嬉戲者波逸提五十二十七羣水中嬉戲波斯匿王與末利夫人在樓上見之夫人遣人往白世尊故制水中戲者放意自恣或從此岸至彼岸或順流逆流或此沒彼出或以手畫水或互相澆灒乃至以鉢盛水戲弄盡波逸提除水已若酪漿清酪漿若苦酒大麥酒汁于器中弄戲者突吉羅比丘尼波逸提餘三衆突吉羅不犯者若路行渡水或于水中牽材木若竹若棑若取石取沙取失物或學浮法若比丘以指相擊攊者波逸提五十三六羣中一人擊攊十七羣中一人乃令命終故制指者手有十腳有十若以手足指相擊攊波逸提若以杖戶鑰拂柄及餘物相擊攊突吉羅比丘尼波逸提餘三衆突吉羅不犯者若眠觸令覺若誤觸若比丘不受諫者波逸提五十四闡陀欲犯戒諸比丘諫而不從故制不受諫者若他遮言莫作是不應爾然故作突吉羅若自知所作非然故作波逸提比丘尼波逸提餘三衆突吉羅不犯者若無智人來諫報言汝可問汝師和尚學問誦經知諫法然後可諫若諫者當用若戲語獨語夢語錯語若比丘恐怖他比丘者波逸提五十五佛在經行處經行時那迦波羅比丘侍佛初夜請佛歸房世尊默然中夜後夜亦爾乃反被拘執作非人恐怖聲世尊清且集衆訶責結戒恐怖者若以色聲香味觸法恐怖人色者或作象形馬形鬼形鳥獸形聲者或貝聲鼓聲波羅聲象馬聲啼哭聲香者根香薩羅樹香樹膠香皮香膚香葉香華香果香若美香若臭氣味者若醋若甜若苦若澀若袈裟味觸者若冷若熱若輕若重若粗細若澀滑法者語前人言我見如是相我夢如是相汝當死亡若失衣鉢若當罷道汝師和尚阿闍黎亦當死亡失衣鉢或罷道汝父母得重病當命終若以如是六塵令彼見聞覺知若怖不怖波逸提若前人不見聞覺知突吉羅若説而了了波逸提説不了了突吉羅比丘尼波逸提餘三衆突吉羅不犯者或暗地坐無燈火或大小便處遙見謂言是象若賊惡獸便恐怖或聞行聲若觸草木聲若謦咳聲而恐怖若以色等視人不作恐怖意若實有是事若實見是相或夢見當死亡罷道失衣鉢及和尚阿闍黎父母有如是事便語彼言我見汝如是變相若戲語獨語等若比丘半月洗浴無病比丘應受不得過除餘時波逸提餘時者熱時病時作時風時雨時道行時此是時五十六摩竭國有池水瓶沙王聽諸比丘常在中浴六羣於後夜入浴王與綵女亦至聞比丘浴聲靜以待之六羣以種種細末藥更相洗浴乃至明相出王竟不得浴諸大臣皆共嫌恚故制熱時者春四十五日夏初一月是病者下至身體臭穢作者下至掃屋前地風雨者下至一旋風一滴雨著身行者下至半由旬路若來若往若除餘時過一遍澆身若水澆半身者波逸提若方便莊嚴欲洗不去者突吉羅比丘尼波逸提餘三衆突吉羅不犯者勢力強使浴若比丘無病自為炙身故若露地然火若教人然除時因緣波逸提五十七六羣以在上座前不得隨意出房外露地然火向灸時空樹中有毒蛇火氣熱逼從樹孔出諸比丘皆驚取所燒薪散擲迸火燒佛講堂故制病者若須火炙身時因緣者為病比丘煮粥羮飯若在溫室若在厨屋若在浴室若熏鉢若染衣若然燈若燒香若比丘無病為自灸故露地然火若然草木枝葉紵麻芻摩牛屎粳糞掃波逸提若以火置草木枝葉等上然者波逸提若燒半燋者若然炭突吉羅若不語前人言看是知是突吉羅比丘尼波逸提餘三衆突吉羅若比丘藏比丘衣鉢坐具針筒若自藏教人藏下至戲笑者波逸提五十八十七羣持衣鉢等著一面經行望食時到六羣俟彼背向時取而藏之時到尋覓在前調弄故制比丘尼波逸提餘三衆突吉羅不犯者實知彼人物體悉故取藏舉若物為風雨飄漬故取藏舉若復物主為性慢藏所有衣鉢放散狼藉為欲戒敕彼故而取藏之若借衣與彼著彼不收攝恐失故取藏之或以此衣鉢諸物故當有命難梵行難故取藏之若比丘與比丘比丘尼式叉摩那沙彌沙彌尼衣後不問主還取著波逸提五十九起自六羣故制與衣者淨施衣也淨施有二種一者真實淨施語言此是我長衣未作淨今為淨故與長老作真實淨二者展轉淨施語言此是我長衣未作淨今為淨故與長老彼應如是語長老聽長老有如是長衣未作淨今與我為淨故我便受受已當問言欲與誰耶答言某甲彼應語言長老有是長衣未作淨今與我為淨故我便受受已與某甲比丘此衣是某甲所有汝為某甲故護持隨意用是中真實淨施者應問主然後取著展轉淨施者語不語隨意若比丘真實施衣不語主而取著者波逸提比丘尼波逸提餘三衆突吉羅若比丘得新衣應三種壞色一一色中隨意壞若青若黑若木蘭若不壞色著餘新衣波逸提六十六羣著白色衣行居士譏嫌故制新者若新衣若初得盡名新衣壞色者染作青黑木蘭也若得新衣不染作三種色更著餘新衣者波逸提若有重衣若輕衣若非衣若鉢囊革屣囊針線囊禪帶腰帶帽襪鑷熱巾革屣巾不作淨而畜者突吉羅若以未染衣寄著白衣家突吉羅比丘尼波逸提餘三衆突吉羅若比丘故殺畜生命者波逸提六十迦留陀夷不喜見烏作竹弓射之殺烏成𧂐故制畜生者不能變化者若自斷命教人斷命方便殺等一切波逸提方便欲殺而不殺突吉羅比丘尼波逸提餘三衆突吉羅不犯者若不故殺若一切斷命無有害心若比丘知水有蟲飲用波逸提六十二起自六羣居士譏嫌故制若蟲水蟲水想波逸提蟲水疑無蟲水蟲水想無蟲水疑突吉羅比丘尼波逸提餘三衆突吉羅不犯者若先不知若有蟲無蟲想若有粗蟲觸水使去若漉水飲若比丘故惱他比丘令須臾間不樂波逸提六十二十七羣問六羣云何入初禪乃至四禪云何入空無相無願云何得四果報言如汝等所説則已犯波羅夷法時十七羣往問上座知其為作疑惱白佛制戒疑惱者若為生若為年歲若受戒若為羯磨若為犯若為法也為生時疑者問言汝生來幾時耶答言爾所時問言汝不爾所時生汝如餘人生非爾所時生問年歲時疑者問言汝今幾歲答言我爾所歲語言汝非爾所歲如餘受戒者汝未爾所歲間受戒疑者問言汝受戒時既年不滿二十又界內別衆問羯磨生疑者問言汝受戒時羯磨不成非法別衆於犯生疑者語言汝犯波羅夷乃至突吉羅於法生疑者語言汝等所問法者則犯波羅夷罪若比丘故為比丘作疑説而了了者波逸提不了了者突吉羅比丘尼波逸提餘三衆突吉羅不犯者其事實爾不故作惱彼非爾許時生恐後有疑悔無故受他利養受大比丘禮敬便語言汝非如許時生彼無爾許年歲恐後有疑悔乃至禮敬便語言汝無爾許年歲若年不滿二十界內別衆欲令彼知還於本處更受戒故便語言汝年不滿二十界內別衆若白不成羯磨不成非法別衆欲令彼知還於本處更受戒故便語言汝白不成羯磨不成非法別衆若彼實爾犯波羅夷乃至吉羅欲令彼知如法懺悔是故言汝犯四重乃至吉羅若彼為性粗疏不知言語便言如汝所説自稱上人法犯波羅夷非比丘行或戲語獨語夢語錯語若比丘知他比丘犯粗罪覆藏者波逸提六十四跋難陀數犯罪向一親厚説之令勿語人後二人共鬪彼即向餘比丘説之餘比丘問知白佛結戒粗罪者四重十三僧殘彼比丘知他比丘犯粗罪小食知食後説食後知初夜説初夜知中夜説俱突吉羅中夜知後夜欲説未説明相出波逸提覆餘罪自覆粗罪覆餘人粗罪盡突吉羅若粗罪粗罪想波逸提粗罪疑非粗罪粗罪想非粗罪疑突吉羅比丘尼波逸提餘三衆突吉羅不犯者若先不知若粗罪非粗罪想或無人可向説若發心言當説未説之間明相已出若因説故或有命難梵行難不説年滿二十應受大戒若比丘知年不滿二十與受大戒此人不得戒彼諸比丘可訶癡故波逸提六十五有十七羣童子先為親友最大者年十七最小者年十二共求出家諸比丘與受大戒時諸童子不堪一食夜半患飢大喚啼哭佛聞結戒若受戒人其年不滿二十和尚知年不滿衆僧及受戒人亦知不滿於衆中問汝年滿二十未報言或滿二十或不滿二十或疑或不知年數或默然或衆僧不問和尚波逸提衆僧突吉羅若和尚知未滿衆僧及受戒人謂滿和尚波逸提衆僧無犯若和尚知未滿衆僧及受戒人疑和尚波逸提衆僧突吉羅若和尚知未滿衆僧及受戒人不知和尚波逸提衆僧無犯若和尚謂年滿衆僧及受戒人知未滿和尚無犯衆僧突吉羅若和尚謂年滿衆僧及受戒人亦謂滿悉無犯若和尚謂年滿衆僧及受戒人疑和尚無犯衆僧突吉羅若和尚謂年滿衆僧及受戒人不知悉無犯若和尚疑衆僧及受戒人知未滿和尚波逸提衆僧突吉羅若和尚疑衆僧及受戒人謂年滿和尚波逸提衆僧無犯若和尚疑衆僧及受戒人亦疑和尚波逸提衆僧突吉羅若和尚疑衆僧及受戒人不知和尚波逸提衆僧無犯若和尚不知衆僧及受戒人知未滿和尚無犯衆僧突吉羅若和尚不知衆僧及受戒人謂年滿悉無犯若和尚不知衆僧及受戒人疑和尚無犯衆僧突吉羅若和尚不知衆僧及受戒人不知悉無犯彼比丘知年不滿二十與受大戒三羯磨竟和尚波逸提二羯磨竟三突吉羅一羯磨竟二突吉羅若白已一突吉羅若白未竟若未作白為作方便若為剃髮若欲集衆若衆僧集和尚突吉羅比丘尼波逸提不犯者若先不知若信受戒人語若信傍人作證若信其父母語若受戒已疑佛言聽數胎中年月及數閏月若數一切十四日説戒以為年數若比丘知諍事如法懺悔已後更發起者波逸提六十六六羣鬬諍事如法滅已後更發起作是言汝不善觀不成觀不善解不成解不善滅不成滅令僧未有諍事而生起已有諍事而不滅故制如法者如法如毗尼如佛所教諍有四種言諍覓諍犯諍事諍若比丘知諍事如法滅已後更發起作如是言不善觀不成觀不善解不成解不成滅不成滅説而了了者波逸提不了了者突吉羅若作餘鬬諍罵詈後更發起若發已鬬諍事若餘人鬪諍罵詈後更發起盡突吉羅若觀作觀想波逸提觀疑不成觀觀想不成觀疑突吉羅比丘尼波逸提餘三衆突吉羅不犯者若先不知若觀不觀想若實不善觀不成觀不善解不成解不善滅不成滅若戲語夢錯語疾疾語若比丘知賊伴結要共同道行乃至一村間波逸提六十七衆比丘與賈客私度關者伴行為守關人所捉波斯匿王訶責放去王衆不服佛聞故制賊伴者若作賊還若方欲去結要者共要至城若至村間道者村間處處道犯輕重如共婦女行戒中説比丘尼波逸提餘三衆突吉羅不犯者若先不知若不共結伴若力勢所持若被繫縛若命難梵行難若比丘作如是説我知佛所説法行淫欲非障道法彼比丘諫此比丘言大德莫作是語莫謗世尊謗世尊者不善世尊不作是語世尊無數方便説犯淫欲是障道法彼比丘諫此比丘時堅持不捨彼比丘乃至三諫捨此事故若再三諫捨者善不捨者波逸提六十八阿梨吒比丘生是惡見諸比丘諫而不捨佛令僧為作訶諫羯磨而結此戒若比丘作如是言我知佛所説法行淫欲非障道法彼比丘諫若受語者善不受語者應為作白已若隨語者善不隨語者作初羯磨乃至二羯磨竟若隨語者善不隨語者作三羯磨竟波逸提二羯磨竟捨者三突吉羅一羯磨竟捨者二突吉羅白已捨者一突吉羅白未竟捨者突吉羅若未作白而作是語我知佛所説法行淫欲事非障道法突吉羅彼比丘諫此比丘時餘比丘遮若比丘尼遮若餘人遮汝莫捨此事若衆僧諫而以不諫遮者一切突吉羅比丘尼波逸提餘三衆突吉羅不犯者若初語時即捨若非法別衆諫若非法和合諫若法別衆法相似別衆法相似和合非法非毗尼非佛所教若無諫者若比丘知如是語人未作法如是邪見而不捨供給所需共同羯磨止宿言語者波逸提六十九阿梨吒不捨惡見諸比丘白佛更作惡見不捨舉時六羣供給所須共同羯磨等故制如是語者作如是語我聞世尊説法行淫欲非障道法未作法者若被舉未為解不捨惡見者衆僧訶諫而不捨供給所須者有二種若法若財法者教修習增上戒增上意增上智學問誦經財者供給衣服飲食臥具湯藥同羯磨者同説戒止宿者屋有四壁等若先後入若俱入隨脅著地波逸提比丘尼波逸提餘三衆突吉羅不犯者比丘不知便入宿若比丘先在屋如是人後入屋比丘不知若屋一切覆而無障或一切覆而半障或一切覆而少障或一切障而無覆或一切障而半覆或一切障而少覆或半覆半障或少覆少障或不覆不障或復露地如是一切不知無犯若病倒地乃至梵行難等若比丘知沙彌作如是語我從佛聞法若行淫欲非障道法彼比丘諫此沙彌如是言妙莫誹謗世尊謗世尊者不善世尊不作是語沙彌世尊無數方便説淫欲是障道法彼比丘諫此沙彌時堅持不捨彼比丘應乃再三訶諫令捨此事故乃至三諫而捨者善不捨者彼比丘應語彼沙彌言汝自今已去不得言佛是我世尊不得隨逐餘比丘如諸沙彌得與餘比丘二三宿汝今無是事汝出去滅去不應住此若比丘知如是衆中被擯沙彌而誘將畜養共止宿者波逸提七十跋難陀有二沙彌作是惡見佛敕比丘作訶諫羯磨三諫不捨乃作滅擯羯磨六羣知而誘畜故制滅擯者僧與作滅擯白四羯磨也畜養者若自畜若與人誘者若自誘若教人誘共宿者若先後至或俱至隨脅著地轉側波逸提比丘尼波逸提餘三衆突吉羅不犯者若先不知等廣如上説若比丘餘比丘如法諫時如是語我今不學此戒當難問餘智慧持律比丘者波逸提若為知為學故應難問七十一起自闡陀故制如法者如法如律如佛所教彼如法諫時作如是語説而了了者波逸提不了了突吉羅比丘尼波逸提餘三衆突吉羅不犯者若比丘癡不解故此比丘作如是語汝還問和尚阿闍梨汝可更學問誦經若其事實爾或戲語夢語等若比丘説戒時作是語大德何用説是雜碎戒為説是戒時令人惱愧懷疑輕訶戒故波逸提七十二衆比丘誦正法毗尼六羣恐其通利數舉我罪語言若欲誦者當誦四事及十三事餘不應誦等餘比丘察知其意欲滅法白佛結戒彼比丘若自説若他説時若誦時作如是語長老何用説此雜碎戒為若欲誦者當誦四事十三事何以故若誦是戒時令人懷疑惱愧説而了了波逸提不了了突吉羅毀呰毗尼波逸提若毀呰阿毗曇及餘契經突吉羅比丘尼波逸提餘三衆突吉羅不犯者語令先誦阿毗曇先誦契經然後誦律若有病須差然後誦律不欲滅法或戲語獨語等若比丘説戒時作如是語我今始知此法戒經所載半月半月説戒經來餘比丘知是比丘若二若三説戒中坐何況多彼比丘無知無解若犯罪應如法治更重增無知罪語言長老汝無利不善得汝説戒時不用心念不一心攝耳聽法彼無知故波逸提七十三六羣中有一比丘自知罪障恐清淨比丘發舉先往語如此言諸比丘察知其故白佛結戒彼比丘若自説戒時若他説時若誦戒時作如是語餘比丘知是比丘二三在布薩中坐何況多彼隨所犯罪如法治應重增無知罪若不與者突吉羅比丘尼波逸提餘三衆突吉羅不犯者未曾聞説戒今始聞若未曾聞廣説今始聞若戲語獨語等若比丘共同羯磨已後如是言諸比丘隨親厚以衆僧物與者波逸提七十四沓婆摩羅子知僧事設會布施不得往衣服破壞衆僧白二羯磨以衣與之時六羣亦在衆中後乃更作是語故制親厚者同和尚同阿闍梨坐起言語親厚者是僧物者如上説物者衣鉢針筒尼師壇下至飲水器彼比丘先共衆僧中作羯磨已後悔言諸比丘逐親厚以僧物與之説而了了波逸提不了了突吉羅比丘尼波逸提餘三衆突吉羅不犯者其事實爾或戲語等若比丘衆僧斷事未竟不與欲而起去波逸提七十五衆比丘集一處論法毗尼六羣疑為彼作羯磨從座起去衆僧止而不住故制事者十八破僧事法非法乃至説不説若比丘僧斷事未竟而起去出戶外波逸提一足在戶外等盡突吉羅比丘尼波逸提餘三衆突吉羅不犯者有僧事塔事瞻病事與欲而去若口噤不能與欲若非法非毗尼羯磨等若比丘與欲已後悔者波逸提七十六六羣中有犯事者恐僧彈舉于一切時六人相隨不離衆僧不得與作羯磨後于作衣時喚之報言不得往僧言可令一二人持欲來便令一比丘來僧即與此比丘作羯磨此比丘還六羣問知其故便言彼作羯磨者非為羯磨羯磨不成我以彼事故與欲不以此事諸比丘嫌責白佛結戒若與欲後悔説而了了波逸提不了了突吉羅比丘尼波逸提餘三衆突吉羅不犯者實非羯磨若戲語等若比丘比丘共鬪諍已聽此語向彼説波逸提七十七起自六羣尼故制鬪諍者言諍覓諍犯諍事諍聽者屏聽他語往而聞者波逸提不聞突吉羅若方便欲去而不去等突吉羅若二人共在暗地語當彈指謦咳驚之若二人隱處語亦當彈指謦咳若在道行有二人在前共語亦當彈指謦咳不爾盡突吉羅比丘尼波逸提餘三衆突吉羅不犯者若欲作非法非毗尼羯磨若為衆僧為塔寺為和尚乃至知識作損減無利無住處羯磨欲知而聽若比丘瞋恚故不喜打比丘者波逸提七十八六羣中一比丘瞋打十七羣比丘故制打者若手若石若杖一切波逸提若餘戶鑰曲鉤拂子柄香爐柄挃者突吉羅比丘尼波逸提餘三衆突吉羅不犯者病須推打噎須椎脊若共語不聞觸令聞若睡眠時以身委他上若來往經行若掃地時誤觸若比丘瞋恚故不喜以手摶比丘者波逸提七十九亦起自前人故制比丘尼波逸提餘三衆突吉羅不犯者他欲打舉手遮若象來盜賊來惡獸來持刺來舉手遮若舉手招喚誤觸若挃令聞語等若比丘瞋恚故以無根僧伽婆尸沙謗者波逸提八十亦起自前人故制比丘尼波逸提餘三衆突吉羅不犯者説實令改若戲語等若比丘剎利水澆頭王種王未出未藏寶而入若過宮門閾者波逸提八十一末利夫人勸波斯匿王既得信樂聽諸比丘入出宮閣無有障礙迦留陀夷入宮王與夫人晝眠遙見尊者即起披衣拂座令坐夫人失衣形露慚愧而蹲尊者還寺語諸比丘比丘嫌責白佛結戒水澆頭種者取四大海水取白牛右角收拾一切種子盛滿其中置金輦上使諸小王與王與第一夫人共坐輦上大婆羅門以水灌王頂上若是剎利種水灌頂上作如是立王故名剎利王水澆頭種若是婆羅門種以水灌頂作如是立王亦處剎利王水澆頭種未出者王未出采女未還本名未藏寶者金銀等一切衆寶瓔珞而未藏取若入王宮過門閾波逸提若一足在內等一切突吉羅若入餘粟散小王豪貴長者家過門閾者突吉羅餘四衆突吉羅不犯者若有所奏白若彼請喚或為力勢所執若命難梵行難若比丘若寶及寶莊飾自捉若教人捉除僧伽藍中及寄宿處波逸提若比丘在僧伽藍中若寄宿處捉寶若以寶莊飾自捉教人捉當作是意若有主識者當取作如是因緣非餘八十二有外道居士路行忘千兩金囊衆比丘見而持去以待識者居士趨還即出與之反以為少訟于波斯匿王王鞠知其詐稅其家資盡沒入官故制毗舍伽母脫瓔珞置樹下往見世尊心存于法忘取還家比丘白佛故僧伽藍中聽取舉又比丘行無住處村寄宿一巧師舍巧師以金銀置舍內而去諸比丘為守護故竟夜不眠還白世尊故寄宿處聽收舉寶者金銀真珠琥珀硨磲碼瑙琉璃貝玉生像金寶莊飾者銅鐵鉛鍚白鑞以諸寶莊飾也若比丘在僧伽藍內若舍宅中若寶及寶莊飾自捉教人捉當識囊器相識裹相繫相應解囊器知幾連綴幾未連綴幾方幾圓幾故幾新若有求索者應問言汝物何似若相應者當還若不相應語言我不見如是物若有二人俱索應問言汝物何似若相應者當還若不相應語言我不見如是物若二人語俱相應者應持物著前語言是汝等物宜各取去若不識囊相裹相繫相若解囊不看幾連綴幾未連綴幾方幾圓幾新幾故一切突吉羅比丘尼波逸提餘三衆突吉羅不犯者若是供養塔寺莊嚴具為堅牢故收舉若比丘非時入聚落不囑比丘者波逸提八十三跋難陀非時入村與居士樗蒱居士不勝以慳嫉故便言比丘晨朝入村為乞食故非時入村為何事耶故制或有僧事塔事瞻病事聽囑餘比丘而去若獨處一房當囑授比房非時者從中後至明相未出比丘者同住客得囑及處非時入村有比丘不囑授初入村門波逸提若一足在門內等一切突吉羅比丘尼波逸提餘三衆突吉羅不犯者若道由村過若有所啓白若受喚請或為力勢所執或被繫縛將去或命難梵行難若比丘作繩床木床足應高如來八指除入陛孔上截竟若過者波逸提八十四迦留陀夷預知佛從此道來即於道中敷高好床座佛知其內懷弊惡訶云此癡人但自為己故制自作教他作成者波逸提不成突吉羅若為他作成不成突吉羅比丘尼波逸提餘三衆突吉羅不犯者若他施已成者截而用之若脫却腳若比丘作兜羅綿貯繩床木床大小褥成者波逸提八十五六羣作此居士嫌其無愧無慈如王大臣故制兜羅者白楊樹華楊柳華蒲臺華大褥者為坐臥故小者為坐故犯輕重如上説比丘尼波逸提餘三衆突吉羅不犯者若鳩羅耶草文若草娑婆草若以毳劫貝碎弊物若用作支肩物作與上枕若比丘作骨牙角針筒刳刮成者波逸提八十六有信樂工師為比丘作骨牙角針筒廢家事業無復衣食世人言其求福得殃故制犯輕重同上餘四衆突吉羅不犯者若鐵若銅若鉛鍚若白蠟若竹木若葦若舍羅草用作針筒若作鍚杖頭鏢攥若作傘蓋子及斗頭鏢若作曲鉤刮汙刀如意玦鈕若作匙杓鉤衣𮢏眼藥篦刮舌刀若作摘齒物挑耳篦禪鎮熏鼻筒若比丘作尼師壇當應量作是中量者長佛二磔手廣一磔手半更增廣長各半磔手若過截竟波逸提八十七佛因見僧臥具不淨所汙聽諸比丘為障身障衣障臥具故作尼師壇六羣便多作廣大者故制迦留陀夷體大不能坐向佛所從來道邊手挽尼師壇欲令廣大佛問知之更增廣長各半磔手尼師壇者敷下坐若長中過量廣中不過量廣中過量長中不過量及俱過量自作成者波逸提不成突吉羅教他作亦如是若為他作成不成突吉羅餘四衆突吉羅不犯者若應量作或減量作若從他得已成者裁割如量若疊作兩重若比丘作覆瘡衣當應量作是中量者長佛四磔手廣二磔手裁竟過者波逸提八十八比丘患癰瘡疥膿血汙身衣臥具佛聽畜覆瘡衣衣粗多毛著瘡舉衣患痛佛聽以細軟衣覆瘡上著涅槃僧時六羣便多作廣長者故制覆瘡衣者有種種瘡病持用覆身犯不犯同上餘四衆突吉羅若比丘作雨浴衣應量作是中量者長佛六磔手廣二磔手半過者裁竟波逸提八十九亦起自六羣故制犯不犯同上若比丘與如來等量作衣或過量作者波逸提是中如來衣量者長佛十磔手廣六磔手是謂如來衣量九十尊者難陀短佛四指諸比丘遙見皆謂是佛即起奉迎至乃知是難陀兩皆懷愧佛制難陀著黑衣時六羣與如來等量作衣或過量作故制犯不犯同前餘四衆突吉羅四波羅提提舍尼法第六若比丘入村中從非親里比丘尼若無病自手取食食者是比丘應向餘比丘悔過言大德我犯可訶法所不應為我今向大德悔過是法名悔過法一時世穀貴乞求難得蓮華色尼乞食所得輒與比丘後一長者乘車覲王尼避道墮泥中掩地而臥長者敕人扶出問知其由嫌比丘無義讓故制不病而自手受食食咽咽波羅提提舍尼餘四衆突吉羅不犯者若有病若置地與若使人授與若在寺與若在村外與若在尼寺中與若比丘至白衣家內食是中有比丘尼指示與某甲羮與某甲飯比丘應語彼比丘尼如是言大姊且止須比丘食竟若無一比丘語彼比丘尼如是言大姊且止須比丘食竟者是比丘應悔過言大德我犯可訶法所不應為我今向諸大德悔過是法名悔過法二六羣與衆比丘在白衣家食時六羣尼為索羮飯捨中間越次與令中間比丘不得食故制餘四衆突吉羅不犯者若尼自為檀越若檀越令尼處分不故作偏與若先作學家羯磨若比丘於如是學家先不請無病自手受食食是比丘應向餘比丘悔過言我犯可訶法所不應為我今向大德悔過是法名悔過法三有居士夫婦俱得信樂於諸比丘無所愛惜遂至貧乏比居譏之佛令僧作學家羯磨而結此戒餘四衆突吉羅不犯者若先受請若復有病若置地與若從人受取若彼學家財物還多從僧乞解學家羯磨僧與作白二羯磨解竟而往若比丘在阿蘭若逈遠有疑恐怖處若比丘在如是阿蘭若處住先不語檀越若僧伽藍外不受食在僧伽藍內無病自手受食食者應向餘比丘悔過言大德我犯可訶法所不應為我今向大德悔過是法名悔過法四諸婦女持飲食詣寺供養盜賊聞之於道路嬈觸比丘白佛佛言自今應語諸婦女莫出道路有賊恐怖若已出城應語莫至寺中道路有賊恐怖乃結此戒不犯者若先語檀越若有病若置地與若教人與若來受教敕聽法時比丘自有私食今授與者一百式叉迦羅尼法第七皆起自六羣比丘等故制當齊整著涅槃僧應當學一不齊整者或時下著或時高著或作象鼻或作多羅樹葉或時細褶下者繫腰臍下高者褰之齊膝象鼻者垂前一角多羅樹葉者垂前二角細褶者繞腰褶皺若故作犯應懺突吉羅以故作故犯非威儀突吉羅若不故作突吉羅下皆倣此餘四衆同不犯者中生瘡下著若腳有瘡高著若僧伽藍內若村外若作時若在道行當齊整著三衣應當學二不齊整者下垂過肘露脅高著過腳上下垂一角垂前兩角後褰高細褶已安緣不犯者肩臂有瘡下著餘同上不得反抄衣入白衣舍應當學三反抄衣者或左右反抄衣著肩上不犯者脅肋下有瘡若僧伽藍內若村外若在道行若作時不得反抄衣入白衣舍坐應當學四不得衣纏頸入白衣舍應當學五纏頸者總捉衣兩角著左右肩上不犯者肩臂有瘡餘如上説不得衣纏頸入白衣舍坐應當學六不得覆頭入白衣舍應當學七覆頭者若以樹葉若以碎段物若衣覆頭不犯者或患寒或頭上生瘡若命難梵行難不得覆頭入白衣舍坐應當學八不得跳行入白衣舍應當學九跳行者雙腳跳也不犯者或時有如是病若為人所打若有賊盜若有惡獸若有荊棘或渡渠水或渡溝塹或渡泥潦不得跳行入白衣舍坐應當學十不得白衣舍內蹲坐應當學十一蹲坐者若在地若在床上尻不至地不犯者或尻邊生瘡若有所與若禮若懺悔若受教誡不得叉腰行入白衣舍應當學十二叉腰者以手叉腰匡肘不犯者脅下生瘡若寺內等不得手叉腰入白衣舍坐應當學十三不得搖身行入白衣舍應當學十四搖身者左右戾身趨行不犯者或時有如是病或時為人所打回戾身避杖或惡象來或被賊師子惡獸所觸或逢擔棘刺人如是事戾身避或渡泥水處或渡溝渠處於中搖身過或時著衣回身看衣齊整不得搖身行入白衣舍坐應當學十五不得掉臂行入白衣舍應當學十六掉臂者垂臂前却也不犯者伴行不及以手招喚餘同上不得掉臂行入白衣舍坐應當學十七好覆身入白衣舍應當學十八不好覆身者處處露現不犯者或被縛若風吹衣離體好覆身白衣舍坐應當學十九不得左右顧視行入白衣舍應當學二十左右顧視者處處觀看不犯者或仰瞻日時節或命難梵行難左右處處伺求方便道欲逃避不得左右顧視白衣舍坐應當學二十一靜默入白衣舍應當學二十二不靜默者高聲大喚若囑授若高聲施食不犯者若聾須高聲喚或高聲囑授或高聲施食若命難梵行難高聲而走靜默白衣舍坐應當學二十三不得戲笑行入白衣舍應當學二十四戲笑者露齒而笑不犯者或脣痛不覆齒或念法歡喜而笑不得戲笑白衣舍坐應當學二十五用意受食應當學二十六不用意者棄羮飯食不犯者或鉢小故食時棄飯或還墮案上當平鉢受食應當學二十七不平鉢者溢滿也餘如上説平鉢受羮應當學二十八羮飯等食應當學二十九不等者羮未至飯已盡飯未至羮已盡不犯者或時正須飯不須羮或時正須羮不須飯或日時欲過或命難梵行難疾疾食以次食應當學三十不次第者鉢中處處取食食不犯者或患飯熱挑取冷處或日時欲過命難梵行難疾疾食不得挑鉢中而食應當學三十一挑者置四邊挑中央至鉢底餘如上説若比丘不病不得自為己素羮飯應當學三十二不犯者若病自索若為他索他為己索不得以飯覆羮更望得應當學三十三不得視比座鉢中應當學三十四視者視誰多誰少不犯者比座眼暗為看得食不得食淨未淨受未受當繫鉢想食應當學三十五不繫鉢想者左右顧視餘如上説不得大摶飯食應當學三十六大摶者口不容受不犯者日時欲過等不得大張口待飯食應當學三十七張口待者飯摶未至先大張口待餘如上説不得含飯語應當學三十八含食語者飯在口中語不可了令人不解不犯者噎而索水或命難梵行難作聲食不得摶飯遙擲口中應當學三十九不犯者被繫縛不得遺落飯食應當學四十遺落者半入口半在手不犯者若噉薄餅燋飯若瓜甘蔗菜菴婆羅果黎閻蔔果蒲桃藥葉心不得頰食食應當學四十一頰食者故作大滿口令兩頰鼓起似獼猴狀不犯者日時欲過等不得嚼飯作聲食應當學四十二不犯者若嚼乾餅燋飯等不得大吸飯食應當學四十三吸飯者張口遙呼吸不犯者若口痛若食羮酪酪漿等不得舌舐食應當學四十四舌舐者以舌舐飯揣食不犯者或被縛或手有泥垢不得振手食應當學四十五不犯者或食中有草有蟲或手有不淨欲振去之或有未受食手觸而汙手振去之不得手把散飯食應當學四十六把散飯者散棄飯餘如上説不得汙手捉飲器應當學四十七汙手者有膩飯著手不犯者或草上受葉上受洗手受不得洗鉢水棄白衣舍內應當學四十八洗鉢水者雜飯水不犯者澡槃承取水持棄外不得生草菜上大小便涕唾除病應當學四十九不犯者在無草菜處大小便流墮生草菜上或為風吹鳥銜而墮生草菜中不得水中大小便涕唾除病應當學五十不得立大小便除病應當學五十一不犯者被縛腳垢汙不得與反抄衣不恭敬人説法除病應當學五十二不犯者若為王及大臣不得為衣纏頸者説法除病應當學五十三不得為覆頭者説法除病應當學五十四不得為裹頭者説法除病應當學五十五不得為叉腰者説法除病應當學五十六不得為著革屣者説法除病應當學五十七不得為著木屐者説法除病應當學五十八不得為騎乘者説法除病應當學五十九不得在佛塔中止宿除為守護故應當學六十不犯者或為強者所執或命難梵行難不得藏財物置佛塔中除為堅牢應當學六十一不得著革屣入佛塔中應當學六十二不得手捉革屣入佛塔中應當學六十三不得著革屣繞佛塔行應當學六十四不得著富羅入佛塔中應當學六十五不得捉富羅入佛塔中應當學六十六不得塔下坐食留草及食汙地應當學六十七不犯者聚著腳邊出時持棄不得擔死尸從塔下過應當學六十八不犯者或須此道行或強力所持不得塔下埋死尸應當學六十九不得在塔下燒死尸應當學七十不得向塔下燒死尸應當學七十一不得佛塔四邊燒死尸使臭氣來入應當學七十二不得持死人衣及床從塔下過除浣染香熏應當學七十三不得佛塔下大小便應當學七十四不得向佛塔大小便應當學七十五不得繞佛塔四邊大小便使臭氣來入應當學七十六不得持佛像至大小便處應當學七十七不犯者道由中過強力所持不得在佛塔下嚼楊枝應當學七十八不得向佛塔嚼楊枝應當學七十九不得佛塔四邊嚼楊枝應當學八十不得在佛塔下涕唾應當學八十一不得向佛塔涕唾應當學八十二不得塔四邊涕唾應當學八十三不得向塔舒腳坐應當學八十四不犯者中間有隔強力所持不得安佛在下房己在上房住應當學八十五不犯者命難梵行難人坐己立不得為説法除病應當學八十六人臥己坐不得為説法除病應當學八十七人在座己在非座不得為説法除病應當學八十八人在高坐己在下坐不得為説法除病應當學八十九人在前行己在後行不得為説法除病應當學九十人在高經行處己在下經行處不應為説法除病應當學九十一人在道己在非道不應為説法除病應當學九十二不得擕手在道行應當學九十三不犯者患眼暗須扶接不得上樹過人除時因緣應當學九十四不得絡囊盛鉢貫杖頭著肩上而行應當學九十五不犯者強力所捉等人持杖不恭敬不應為説法除病應當學九十六不犯者王及大臣人持劒不應為説法除病應當學九十七人持矛不應為説法除病應當學九十八人持刀不應為説法除病應當學九十九人持蓋不應為説法除病應當學一百七滅諍法第八在第三分滅諍犍度中有四種諍一言諍者比丘共比丘諍言引十八諍事法非法乃至説不説若以如是相共諍言語遂彼此共鬪二覓諍者比丘與比丘覓罪以三舉事破戒破見破威儀見聞疑作如是相覓罪三犯諍者犯七種罪一波羅夷二僧殘三墮四悔過五偷蘭遮六突吉羅七惡説四事諍者言諍中事作覓諍中事作犯諍中事作是中言諍以二毗尼滅謂現前多人語或一毗尼滅謂現前覓諍以四毗尼滅謂或現前憶念或現前不癡或現前罪處所犯諍以三毗尼滅謂或現前自言治或現前草覆地事諍以一切毗尼滅隨所犯應與現前毗尼當與現前毗尼迦留陀夷與六羣往河中浴迦留陀夷浴竟上岸著六羣衣謂是己衣不看而去六羣上岸不見己衣秖見迦留陀夷衣即言迦留陀夷偷我衣人不在現前便作滅擯羯磨迦留陀夷白佛佛問以何心取答言謂是我衣不以賊心佛言不犯不應不看衣而著不應人不現前而作羯磨訶責羯磨擯羯磨依止羯磨遮不至白衣家羯磨舉羯磨滅擯羯磨若作羯磨不成得突吉羅自今已去為諸比丘結現前毗尼滅諍應如是説現前毗尼云何現前法毗尼人僧界云何法現前所持法滅諍者是云何毗尼現前所持毗尼滅諍者是云何人現前言義往返者是云何僧現前同羯磨和合集一處不來者囑授在現前得訶而不訶者是云何界現前在界內羯磨作制限者是若諍事滅更發起者波逸提與欲已後悔者波逸提後六毗尼滅亦如是應與憶念毗尼當與憶念毗尼沓婆摩羅子不犯粗罪諸比丘故問不已應與憶念毗尼彼應僧中三乞大德僧聽我某甲不犯重罪諸比丘言我犯重罪波羅夷僧殘偷蘭遮諸比丘問我言汝憶犯重罪不我不憶犯重罪答言我不憶犯如是重罪諸長老不須數數難詰問我而諸比丘故難詰不止我今不憶念從僧乞憶念毗尼願僧與我憶念毗尼慈愍故僧為白四羯磨大德僧聽此某甲不犯重罪波羅夷僧殘偷蘭遮諸比丘皆言犯重罪波羅夷乃至偷蘭遮諸比丘問言汝憶犯重罪波羅夷乃至偷蘭遮不彼不憶犯重罪即答言我不犯重罪諸長老不須難詰問我而諸比丘故難詰不止彼不憶念罪今從僧乞憶念毗尼若僧時到僧忍聽與彼憶念毗尼白如是羯磨準作云何憶念毗尼彼比丘此罪更不應舉不應作憶念應與不癡毗尼當與不癡毗尼難提比丘癲狂心亂多犯衆罪後還得心諸比丘詰問不止應與不癡毗尼彼應僧中三乞僧為白四羯磨準前應知云何不癡毗尼彼比丘此罪更不應舉不應作憶念者是應與自言治當與自言治世尊説戒時有犯罪者近佛而坐佛默然不説目連知之捉臂牽出佛言不應爾令彼伏罪然後與罪云何自言説罪名罪種懺悔者是云何治語言自責汝心生厭離也應與覓罪相當與覓罪相結罪處所也象力比丘共外道論得切問時前後言語相違於僧中問時亦復前後言語相違在衆中故作妄語外道譏嫌佛令僧作罪處所白四羯磨集僧已為作舉作舉已為作憶念作憶念已與罪如是白大德僧聽此象力釋子好論議與外道論得切問時前後言語相違設於衆僧中問亦前後言語相違衆中故作妄語若僧時到僧忍聽僧今與象力釋子作罪處所羯磨汝象力無利不善得汝得切問時前後語言相違設衆僧中問時亦復如是在衆中故作妄語白如是羯磨準作云何罪處所彼比丘此罪與作舉作憶念者是應與多人覓罪當與多人覓罪舍衛諸比丘諍衆僧求覓罪佛言應用多人知法者語聽行籌差行籌人白二羯磨有五法不應差愛恚怖癡不知已行不行反上五法者應差有三種行籌一顯露二覆藏三耳語若衆中雖非法比丘多然彼和尚等皆如法應顯露行籌應作二種籌一破二完白言作如是語者捉不破籌作如是語者捉破籌行籌已應別處數若如法者多彼應作白作如是語者諍事滅若如法者少應作禮便起去遣信往比丘住處僧中白言彼住處非法比丘多善哉長老能往至彼若如法語比丘多諍事滅功德多此比丘聞應往若不往如法治若衆中雖如法比丘多而彼和尚及上座等不如法若顯露行籌恐諸比丘隨和尚等捉籌應覆藏行籌若衆中雖如法比丘多而彼和尚等非法説應耳語行籌行籌時應稀坐間容一人身小障翳彼比丘作耳語語言汝和尚等已捉籌善哉汝亦當捉籌慈愍故若如法比丘多諍事得滅得功德多行籌已在一面數之應與如草覆地當與如草覆地舍衛國比丘共諍諸比丘多犯衆戒非沙門法亦作亦説出入無限後諸比丘自作是念我曹若還共問此事或令此諍事轉深重經歷年月不得滅除令僧不得安樂以是白佛佛言應滅此事諍如草覆地彼一衆中有智慧堪能比丘從座起胡跪合掌作如是言諸長老我等此諍事多犯衆罪非沙門法言無限齊出入行來不順威儀若我等尋究此事恐令罪深重不得如法如毗尼如佛所教諍事滅令諸比丘住止不安樂若長老忍者我今為諸長老作如草覆地懺悔此罪第二衆中亦如是説彼諸比丘應作白大德僧聽若僧時到僧忍聽僧令此諍事作草覆地懺悔白如是作是白已作如草覆地懺悔有智慧堪能者胡跪合掌如是白諸長老我今此諸諍事已所犯罪除重罪遮不至白衣家羯磨若諸長老聽者為諸長老及已作草覆地懺悔第二衆亦應作如是説云何草覆地不稱説罪名罪種懺悔者是按律文於五篇加偷蘭遮為六聚仍列在僧殘後七則律中開吉羅為惡作惡説篇則從條受稱聚乃隨罪得名事鈔列釋篇聚並無正譯但用義翻耳波羅夷僧祗義當極惡三意釋之一者退沒由犯此戒道果無分二者不共住非但失道而已亦不得於僧中共住三者墮落捨此身已墮在泥犁如人斷頭不可復起僧伽婆尸沙十誦律云是罪屬僧僧中有殘因衆僧前悔過得滅是名僧伽婆尸沙毗尼母經云如人為他所斫殘有咽喉名之為殘若得好醫良藥可得除差若無者不可差也犯僧殘者亦復如是有少可懺悔之理若得清淨大衆為如法説懺悔除罪之法此罪可除若無清淨大衆不可除滅偷蘭遮翻為大障又翻大罪亦云粗惡此有二種一者從生謂初二篇方便罪亦名因蘭二者獨頭謂初二篇等流罪亦名果蘭亦名自性蘭此二種罪各分三品因蘭三者波羅夷近方便名上品如欲行淫與女身相觸欲盜重物揀取未離處等應一切僧中悔過除罪波羅夷次方便及僧殘近方便名中品如欲行淫捉有衣女身欲弄失精未出中止等應界外四比丘前悔過除罪僧殘次方便名下品如手捉陰未弄欲觸女身未及等應一比丘前悔除果蘭三者如破法輪主盜四錢殺天等名上品若破羯磨僧破法輪伴盜三二錢等名中品若剃毛裸形畜人皮石鉢食生血肉著外道衣盜一錢等名下品悔法準如因蘭此偷蘭一聚罪通正從體兼輕重七聚六聚並含偷蘭或在上下折有由也律中或次僧殘後者由是戒分所攝罪名重也尼薩耆波逸提尼薩耆此云捨波逸提此云墮謂墮在燒煮覆障地獄故也凡有百二十事其中三十因財事生犯貪慢心強制捨入僧故云是物應往僧中捨波逸提應悔過也餘九十事名單提者無有捨法但有悔過而已若據罪體同一品懺故篇聚中皆合為一也波羅提提舍尼義翻向彼悔律攝云謂於住處現有苾芻皆須一一別對陳説不同餘罪故受別名又犯罪已即須陳説不得停息亦異餘罪突吉羅此翻惡作凡衆學法滅諍法及隨律威儀法并前二篇遠方便第三第四篇一切方便皆歸此聚僧祇名為越毗尼罪根本名為越法罪此亦復分二聚一惡作二惡説舊謂身名惡作口名惡説恐未必然夫前五聚總制七支胡此二名乃分身口然按四分有應懺吉羅有責心吉羅僧祇有越毗尼罪有越毗尼心悔蓋謂重者須對一人説悔除罪名為惡作輕者但當心念口言自懲名為惡説也羯磨此云作法亦翻為業為所作為事為辦事凡有三種一者單白羯磨謂差屏教人説戒自恣等二者白二羯磨謂一白一羯磨如結界及受日等三者白四羯磨謂一白三羯磨如受具及與學等三種羯磨總百一事故名百一羯磨然諸部開合不等乃是以類相收無違妨也珍敬録跋先師講毗尼之暇手輯僧祇律若干條釐為上下卷題曰毗尼珍敬録蓋取世尊遺教所云也噫師之意深矣大乘菩薩十重四十八一時頓結小乘聲聞二百五十隨事漸制如來三復可嚀辭繁不殺結集為五部四分卷帙浩繁末世鈍根未易簡閲師乃適時之巧故録其條目綱領明簡且易以從機也噫師之意微矣末法比丘少持戒律鳥鼠獅蟲相沿既久鵝珠草繫曾未之聞以古視今誠堪流涕蓋欲藉此諄諄扶律訓授門徒成其五分法身爾嗚呼此録甫成師隨化去久塵篋中未能壽梓皆因檀波未集較讐未遑故也頃新伊真兄與素華旭公稍加參訂募緣以鋟誠可為近世之眼目萬古之良謨也是役也不獨先師為鹿苑之功臣而新兄真為蓮居之孝子旭公又吾儕之畏友矣余愧未嘗閲律又不善為文然知師輯録之意不能無感於斯乃托其顛末如此并識歲月云時崇禎癸酉佛歡喜日苕上病頭陀海眼槃談書
