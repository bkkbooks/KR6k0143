front:
  text: 毗尼珍敬錄序木叉之不珍於世也非獨愚不肖人之罪也葢一蝕於圓解再蠧於菩薩乘而踰閑蕩檢者不與焉圓解者曰無非法界何執為不知不執云者謂其事得理融不謂執理而反礙事也菩薩乘者曰見機得開戒何拘小不知菩薩比丘乃開小以成大非謂受大而遂棄小也若非清淨尸羅為三昧本世禪尚無諦從何發倘任愛見羅剎毀棄浮囊自尚巨存利他安在二十五方便二健兒為稱首天台旨哉其言之矣我雲棲大師發天台之隱扶律輔教為萬世規第亟於梵網而未遑四分躍冶之流尚藐篇聚為長物蓮居紹公精徹台宗取四分手自輯錄以就茲篇真妙補祖闕而善繼師志者公往而其書塵襲已十餘年近冢嗣新師始托素師訂定而會程居士啟六年長講之願將嚴淨毗尼為學士準繩遂有發心任書任梓者法運通塞固自有時嗟乎金剛固能潰膓琉璃方堪盛乳與其乘急戒緩雖得道而苦歷三途何如乘戒俱急以人天身而安然得道雲光負軛千古長嗟紹公之成就獅子兒豈獨一說經而已哉豈獨一說經而已哉毗尼珍敬錄目次卷上序戒相品附戒相攝頌智旭述四波羅夷法第一十三僧伽婆尸沙法第二二不定法第三三十尼薩耆波逸提法第四卷下九十波逸提法第五四波羅提提舍尼法第六一百式叉迦羅尼法第七皆記自六群比丘等故制七滅諍法第八在第三分滅諍犍度中䟦毗尼珍敬錄目次終戒相攝頌比丘智旭述按僧祗律結集之時先出攝頌後出律文根本律中亦有攝頌葢為初機便於記誦也今四分律既無此頌設欲傍取他宗則次序不類欲仍其舊又慮初機記誦為難故輒援例頌之俾初學先誦乎此則五篇戒相已提挈其綱領矣婬欲盜五錢故斷人類命無知妄言證除增上慢人是四波羅夷犯者不可救弄失精觸女麤惡索婬供媒嫁房過量大房不處分無根謗取片破僧及伴黨被𢷤反嫌僧惡性不受語前九初便犯後四皆三諫是十三僧殘二十眾中悔不定法有二三二隨所治捨墮有三十長衣離宿衣待足過一月取非親里尼及使浣染打從非親里乞過受自恣請求益價合作索衣過六反是為初十法蠶綿作臥具純黑不雜色不滿六年持坐具不帖故持羊毛遠行使尼浣染擘受金銀賣買販賣為二十長鉢更求好非親織作衣許直求好織與衣後瞋奪殘藥過七日雨衣前求用過畜急施衣後月離六夜迴僧物入己是為三十法物向僧中捨波逸提說悔單提九十事妄語毀呰語兩舌女同室未受戒三宿共誦向說罪及說過人法與女過說法掘地是初十損壞鬼神村異惱及嫌罵露敷僧臥具并房中不舉強奪止宿處牽他出僧房閣坐脫脚床蟲水澆泥草覆房過三節此是第二十自往教授尼僧差教至暮譏論教尼人衣與非親里作衣屏處坐期行及乘船尼讚嘆得食女同行三十過受一食施展轉及別眾過三鉢受請不作餘食法故使他人犯非時與殘宿不受索好食第四十法竟自與外道食詣餘家不囑食家強安坐及在屏處坐露地獨與女使他不得食過受請與藥觀軍過三宿宿時觀軍事是名第五十歙酒水中戲擊攊不受諫怖他過洗浴露地輒然火戲藏他衣物不問著施衣新衣不壞色第六十法竟故殺畜生命飲用有蟲水惱他覆他罪授戒不如法發起已滅諍同賊伴共行惡見諫不捨供給與同事畜被𢷤沙彌波逸提七十拒諫輕訶戒無知違羯磨不與欲後悔屏聽語瞋打手摶僧殘謗八十波逸提入王宮捉寶非時入聚落高床兜羅褥骨牙角鍼筒坐具覆瘡衣雨浴衣過量及等佛衣量九十單提竟如法悔清淨不悔墮無疑受非親尼食不止尼代索學家恐處受四名悔過法眾學著衣初入白衣舍法受食大小便說法恭敬塔攜手行上樹絡杖等應學現前及憶念不癡并自言覔罪多人語草覆七滅諍如是諸篇聚比丘所應知如說修行人諸佛其稱美此戒相頌藕益老人述于毗尼集要今從彼添入四種僧頌自恣出罪及受具四僧上三不應作受具出罪五僧除十僧之中除出罪除上三法餘應作二十僧中皆許作況復多僧何不爾尼及被𢷤誡足數相似非法別眾羯磨頌應一白三白不作或作不白或多白作多羯磨是非法不舉亂舉非毗尼不來不與應訶訶別眾為彼白此是非法背作後白法相似不來欲與訶不訶如白如作是如法舉罪法舉如毗尼十二人不應訶誦愚謂惡思惡說作不持三藏是為痴不明三藏不善理犯棄新增舊怨嫌外住捨棄言無次捨儀失性授學人應訶三頌住本性者言次第不捨微儀是可訶十重四十八輕戒攝頌殺盜婬妄及酤酒食肉五辛不教悔不供請法懈不聽背大向小不看病畜殺生具共成十國使販賣及謗毀放火焚燒並僻教為利倒說恃乞求無解作師並兩舌不行放救成二十報讐憍慢不下問憍慢僻說不學佛不善知眾獨受利不受別請別請僧念九邪命而自活不敬好時成三十不行救贖害眾生邪業覺觀暫念小不發願並不發誓冐進遊行乖尊卑不修福慧三十九擇受戒兮利作師為惡人而莫說戒無慚受施不供經不化生說法不如非法制限及破法六八輕戒及十重廣攝佛法戒無餘
