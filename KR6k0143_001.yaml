說以異分無根波羅夷法謗僧殘若比丘犯僧殘言犯波羅夷以異分無根波羅夷法謗僧殘若比丘犯僧殘彼謂波逸提乃至惡說以異分無根波羅夷法謗僧殘不清淨不清淨人相似名同姓同相同以此人事謗彼以異分無根波羅夷法謗僧殘不清淨與清淨人相似清淨人與不清淨人相似清淨人與清淨人相似亦如是若見本在家時犯淫盜五錢過五錢斷人命便語人言我見比丘犯淫等以異分無根波羅夷法謗僧殘若聞亦如是若比丘以異分無根波羅夷法謗說了了者僧殘不了了偷蘭遮若指印書使作知相亦如是除四重已以餘異分無根非比丘法謗僧殘乃至指印書使作知相亦如是除上事已更以餘異分無根法謗比丘隨前所犯及餘人等皆同前說若比丘欲壞和合僧方便受壞和合僧法堅持不捨彼比丘應諫是比丘大德莫壞和合僧莫方便壞和合僧莫受壞僧法堅持不捨大德應與僧和合與僧和合歡喜不諍同一師學如水乳合於佛法中有增益安樂住是比丘如是諫時堅持不捨彼比丘應三諫捨此事故乃至三諫捨者善不捨者僧伽婆尸沙十提婆達既欲害佛復教阿闍世害父惡名流布利養斷絶即通已五人家家乞食佛制不得別衆食提婆達即生此念瞿曇乃斷人口食我寧可破彼僧輪即以五法教諸比丘盡形壽乞食著糞掃衣露坐不食蘇鹽不食魚肉令其信樂方便破彼僧輪諸比丘白佛佛令僧訶諫而結此戒和合者同一羯磨同一說戒僧者四比丘乃至無數破者有十八事法非法律非律犯不犯輕重殘無殘粗惡非粗惡常所行非常所行制非制說非說住破僧法者即住此十八事若比丘方便欲破和合僧受破僧法堅持不捨彼比丘當諫此比丘言大德莫方便欲破和合僧莫受破僧法堅持不捨大德當與僧和合歡喜不諍同一水乳於佛法中有增益安樂住大德可捨此事莫令僧作訶諫而犯重罪若用語者善不用語者復令比丘比丘尼優婆塞優婆夷若王大臣異道沙門婆羅門求若餘方比丘聞知其人信用言者應來若用言者善不用言者應作白作白已應更求大德我已作白竟餘有羯磨在汝今可捨此事莫令僧作羯磨重犯重罪若用語者善不用語者應作初羯磨作已應更求大德我已作白初羯磨竟餘有二羯磨在可捨此事莫令僧更作羯磨而犯重罪若用語者善不用語者應作第二羯磨作竟更求大德我已作白二羯磨竟餘有一羯磨在可捨此事莫令僧更作羯磨而犯重罪若能捨者善不捨與說第三羯磨竟僧殘作白二羯磨竟捨者三偷蘭遮作白一羯磨竟捨者二偷蘭遮作白竟捨者一偷蘭遮初白未竟捨者突吉羅若一切未白方便欲破和合僧受破僧法不捨一切突吉羅若僧為破僧人作羯磨時有比丘教言莫捨偷蘭遮若不訶諫突吉羅尼教莫捨亦如是除比丘及尼更有餘人教莫捨盡突吉羅比丘尼僧殘餘三衆突吉羅不犯者初諫便捨若非法別衆作訶諫非法和合衆作訶諫法別衆法相似別衆法相似和合衆非法非律非佛所教若一切未作訶諫若破惡友惡知識若破方便欲破僧者遮令不破若破方便助破僧者二三人羯磨若欲作非法毗尼羯磨若為僧為塔為和尚同和尚阿闍黎同阿闍黎為知識作損減作無住處破者不犯若比丘伴黨若一若二若三乃至無數彼比丘語是比丘大德莫諫此比丘此比丘是法語比丘律語比丘此比丘所說我等喜樂此比丘所說我等忍可彼比丘言大德莫作是說言此比丘是法語比丘律語比丘此比丘所說我等喜樂此比丘所說我等忍可然此比丘非法語比丘非律語比丘大德莫欲破壞和合僧汝等當樂欲和合僧大德與僧和合歡喜不諍同一師學如水乳合於佛法中有增益安樂住是比丘如是諫時堅持不捨彼比丘應三諫捨是事故乃至三諫捨者善不捨者僧伽婆尸沙十一提婆達伴黨語諸比丘莫訶諫提婆達諸比丘白佛佛令僧訶諫而結此戒順從有二法順從衣食順從法順從者以法教授增戒定慧𮘗誦承受衣食順從者給與衣被飲食臥具湯藥伴黨者若四人若過四人助伴黨語者若一二三若衆多若比丘作非法羣黨彼比丘諫此比丘若隨語者善若不隨語者當為作白白三羯磨乃至有犯無犯並同前說若比丘依聚落若城邑住汙他家行惡行汙他家亦見亦聞行惡行亦見亦聞諸比丘當語是比丘言大德汙他家行惡行汙他家亦見亦聞行惡行亦見亦聞大德汝汙他家行惡行今可遠此聚落去不須住此是比丘語彼比丘作是語大德諸比丘有愛有恚有怖有癡有如是同罪比丘有驅者有不驅者諸比丘報言大德莫作是語有愛有恚有怖有癡有如是同罪比丘有驅者有不驅者而諸比丘不愛不恚不怖不癡大德汙他家行惡行汙他家亦見亦聞行惡行亦見亦聞是比丘如是諫時堅持不捨者彼比丘應再三諫捨此事故乃至三諫捨者善不捨者僧伽婆尸沙十二䩭連有二比丘一名阿濕婆二名富那婆娑作非法行自種華樹教人種華樹乃至受雇戲笑等時有衆比丘乞食䩭連齊整庠序低目直前居士反以為過比丘知之具以白佛佛遣舍利弗目連往作𢷤羯磨作羯磨時二比丘言僧有愛等舍利弗目連還以白佛佛令僧訶諫而結此戒汙他家有四種一依家汙家從一家得物與一家所得物處聞之不喜所與物處思當報恩即作是言若與我者我當與之若不與我我何故與二依利養汙家若比丘如法得利乃至鉢中之餘與一居士不與一居士彼得者念當報其恩有與我者我當報之若不與我我何故與三依親友汙家若比丘依王若大臣或為一居士不為一居士其所為者即思報恩為我者我當供養不為我者我不供養四依僧伽藍汙家若比丘取僧華果與一居士不與一居士即作是念與我者我當供養不與我者我不供養行惡行者自種華樹教人種華樹自溉灌教人溉灌自摘華教人摘華自作華鬘教人作華鬘自以線貫若繫教人線貫若繫自持華教人持華自持華鬘與人教人持華鬘與人與婦人童女一床坐起一器飲食口語戲笑或自歌舞伎樂或他作己唱和或俳說或彈鼓吹簧及貝作孔音作衆鳥鳴或佯跛行走或受顧戲笑若比丘依聚落住汙他家行惡行俱有見聞彼比丘諫此比丘言大德汙他家行惡行俱有見聞可捨此事莫為僧所訶更犯重罪若隨語者善不隨語者應作白白三羯磨皆同前說不犯者初語時捨若與父母病人小兒娠身婦女牢獄繫人寺中客作若為三寶種華樹等教人取華供養三寶若走避恐難若跳躑坑渠若嘯喚伴行若比丘惡性不受人語於戒法中諸比丘如法諫己自身不受諫語言諸大德莫向我說若好若惡我亦不向諸大德說若好若惡諸大德且止莫諫我彼比丘諫是比丘言大德莫自身不受諫語大德自身當受諫語大德如法諫諸比丘諸比丘亦如法諫大德如是佛弟子衆得增益展轉相諫展轉相教展轉懺悔是比丘如是諫時堅持不捨彼比丘應三諫捨是事故乃至三諫捨者善不捨者僧伽婆尸沙十三闡陀惡性不受人語佛令僧訶諫而結此戒惡性不受語者不忍受人教誨以戒律如法教授者有七犯聚波羅夷僧伽婆尸沙波逸提波羅提提舍尼偷蘭遮突吉羅惡說如法者如法如律如佛所教若比丘惡性不受人語諸比丘以戒律如法教授自身作不可共語彼比丘諫此比丘若隨語者善不隨語者應作白及三羯磨說第三羯磨竟僧殘白二羯磨捨者三偷蘭遮一羯磨捨者二偷蘭遮白竟捨者突吉羅未白前惡性不受人語突吉羅作訶諫時餘比丘及尼教言莫捨偷蘭遮未諫時教突吉羅餘人教訶未訶盡突吉羅比丘尼僧殘餘三衆突吉羅不犯者初語時捨非法別衆乃至非佛所教未訶諫前若無智人諫時當與彼言汝和尚阿闍黎所行亦如是汝可更學問誦經若其事如是若戲笑語乃至錯說二不定法第三若比丘共女人獨在屏覆處障處可作淫處坐說非法語有住信優婆夷於三法中一一法說若波羅夷若僧伽婆尸沙若波逸提是坐比丘自言我犯是罪於三法中應一一治若波羅夷若僧伽婆尸沙若波逸提如住信優婆夷所說應如法治是比丘是名不定法一迦留陀夷與親友婦齊優婆夷互相繫意於乞食時往至其家共一床坐說非法語毗舍佉母聞聲窺見白佛制戒獨者一比丘一女人屏覆二種一見屏覆若塵若霧若黑暗中不相見二聞屏覆乃至常語不聞聲處障覆者若樹牆壁籬衣及餘物障可作淫處者得容行淫處說非法語者說淫欲法住信優婆夷者歸信三寶受持五戒善憶持事不錯所說真實而不虗妄若比丘自言所趣向處所到處若坐若臥若作即應如比丘語治若自言所趣向處乃至臥不自言作若自言所趣向處乃至坐不自言臥作若自言所趣向處所到處不自言坐臥作若自言所趣向處不自言所到處及坐臥作若一切不自言皆應如優婆夷所說治是中無定法故言不定若比丘共女人在露現處不可作淫處坐作粗惡語有住信優婆夷於二法中一一法說若僧伽婆尸沙若波逸提是坐比丘自言我犯是罪於二法中應一一治若僧伽婆尸沙若波逸提如住信優婆夷所說應如法治是比丘是名不定法一緣起同前露處者無牆壁樹籬及餘物障不可作淫處者不容行淫處粗惡語者說淫欲法二道好惡餘同前說三十尼薩耆波逸提法第四若比丘衣已竟迦絺那衣已出得長衣經十日不淨施得畜若過十日尼薩耆波逸提一佛聽比丘畜三衣不得長六羣比丘畜長衣或早起衣或中時衣或晡時衣故制阿難得一糞掃衣欲奉大迦葉迦葉不在阿難白佛佛問迦葉何時當還報言却後十日乃聽畜十日衣竟者三衣迦絺那衣此云功德衣安居竟受之於五月中得五事利益具在迦絺那度中長衣者若長佛八指若廣四指是若比丘一日得衣畜二日得衣乃至十日得衣畜至十一日明相出一切尼薩耆若比丘一日得衣二日不得三日乃至十日得衣至十一日明相出九日中所得衣盡尼薩耆此中九日得衣一日不得以不得一日從二日轉至十日如是二曰不得八日得三日不得七日得四日不得六曰得五日不得五日得六日不得四日得七日不得三日得八日不得二日得九日不得一日得一一皆以不得展轉作句而句句第一日畜衣不改如是諸句盡尼薩耆若比丘一日得衣不淨施二日得衣淨施三日乃至十日不淨施至十一日明相出九日中所得衣盡尼薩耆如是展轉作句如上如是若遣與人若失衣若故壞若作非衣若作親厚意取若忘去以此諸句一一以替淨施之句作句如上盡尼薩耆若捨墮衣不捨持更貿餘衣一尼薩耆一突吉羅尼薩耆波逸提此云捨墮以後並從簡作捨墮此捨墮衣應捨與僧若衆人若一人不得別衆捨若捨不成捨突吉羅捨時應往僧中偏袒胡跪當作是語大德僧聽我某甲比丘故畜爾所長衣過十日犯捨墮今捨與僧捨竟當懺悔受悔人當作白然後受懺作如是白大德僧聽此某甲比丘故畜爾所長衣犯捨墮今捨與僧若僧時到僧忍聽我受某甲比丘懺悔白如是白已受悔當語彼言自責汝心答言爾若僧多難集此比丘若因緣事欲遠行應問言汝衣與誰隨彼說便與僧即應還此比丘衣白二羯磨應如是與僧中當差堪能羯磨人作如是白大德僧聽某甲比丘故畜爾所長衣犯捨墮今捨與僧若僧時到僧忍聽持此衣與某甲比丘彼某甲比丘當還此比丘白如是大德僧聽此某甲比丘故畜爾所長衣犯捨墮今捨與僧僧持此衣與彼某甲比丘彼某甲比丘當還此比丘誰諸長老忍僧持此衣與彼某甲比丘彼某甲比丘當還此比丘者默然誰不忍者說僧已忍與彼某甲比丘衣竟僧忍默然故是事如是持是比丘於僧中捨衣竟不還者突吉羅若還時有人言莫還者突吉羅若作淨施若遣與人若持作三衣若作波利迦羅衣若故壞若燒若作非衣若數數著壞者盡突吉羅比丘尼捨墮餘三衆突吉羅不犯者齊十日內淨施若遣與人若奪失燒漂等想不淨施不遣與人若奪衣失衣燒衣漂衣取著若他與著若他與作彼受付囑衣者若命終遠出休道賊將去獸害水漂如此不作淨施不遣與人不犯若比丘衣已竟迦絺那衣已出三衣中離一一衣異處宿除僧羯磨尼薩耆波逸提二六羣往遊人間持衣付囑親友比丘數數在日中曬諸比丘問知其故白佛結戒時一比丘有乾痟病以事欲遊人間糞掃僧伽梨重不堪持行同伴為白佛佛聽僧與病比丘結不失衣白二羯磨三衣者僧伽梨多羅僧安陀羅會僧者一說戒一羯磨不失衣者僧伽藍裏有一界失衣者僧伽藍裏有若干界不失衣者樹有一界失衣者樹有若干界如是場車船村舍堂庫藏倉亦如是僧伽藍四種如上樹者與人等足蔭覆跏趺坐場者於中治五穀處車者若車回轉處船者若船回轉處村者如上堂者多敝露庫者儲積藏諸車乘輦輿販賣之物倉者儲積米穀僧伽藍界者此僧伽藍界非彼僧伽藍界此僧伽藍界非彼樹界乃至倉界非彼倉界亦如是餘作句亦然僧伽藍界者在僧伽藍邊以中人用石若甎擲所及處是名為界乃至倉界亦如是若比丘置衣在僧伽藍內乃在樹下宿明相未出若捨衣若手捉衣若至擲石所及處若不捨衣等明相出隨所離衣宿捨墮若留衣著僧伽藍內往場處乃至庫藏倉處宿若留衣樹下往場處乃至僧伽藍處宿亦如是不失衣者若阿蘭若處無界八樹中間一樹間七弓遮摩梨國作弓法長中肘四肘若比丘無村阿蘭若處留衣著此八樹間異處宿明相未出不捨衣不手捉衣若不至擲石所及處明相出捨墮除三衣離餘衣突吉羅捨法如上說比丘尼捨墮不犯者明相未出手捉衣若捨衣若至擲石所及處若奪失燒漂壞想若大水漲道路險難賊盜難惡獸難若強力所執若被繫縛命難梵行難若比丘衣已竟迦絺那衣已出若比丘得非時衣欲須便受受已疾疾成衣若足者善若不足者得畜一月為滿足故若過畜尼薩耆波逸提三有比丘僧伽梨故爛弊壞十日中間更不能辨恐犯前戒同伴為白佛因聽畜乃至滿足六羣有糞掃衣及餘種衣同者不足取中糞掃衣浣染點作淨寄親友比丘已遊行受寄比丘以其行久不還便出曬之諸比丘問知其故白佛結戒時者無迦絺那衣自恣後一月若有迦絺那衣自恣後五月非時者若過此限若十日中同衣足者應裁割線拼縫作衣若作淨施若遣與人若不如此十一日明相出隨衣多少捨墮若同衣不足至十一日同衣足即應裁割等如上若不裁割等至十二日明相出隨衣多少盡捨墮乃至二十九日亦如是若同衣不足三十日若足不足同衣不同衣應即日裁割等不爾至三十一日明相出捨墮捨法同上說比丘尼捨墮餘三衆突吉羅不犯者若十日內同衣足裁割線拼縫作衣若淨施若遣與人乃至二十九日亦如是至三十日若足若不足同衣不同衣即日應裁割乃至遣與人餘如上說若比丘從非親里比丘尼取衣除貿易尼薩耆波逸提四有一比丘著弊衲蓮華色尼見已慈愍即以所著責價衣易之後著此弊衣見佛佛言不應如是聽汝畜持五衣完堅者餘衣隨意與人乃集衆結戒是後比丘不敢從親里尼取衣佛言若是親里籌量知有無可取不可取若好若惡若新若故故聽從親里取又祗洹中二部僧得施衣共分時比丘誤得尼衣尼誤得比丘衣尼持衣相易比丘白佛故聽貿易親里者父母親里乃至七世有親貿易者以衣貿衣以衣易非衣或以非衣貿衣若針若筒若刀若線若小段物乃至一丸藥拾法如上說餘四衆突吉羅不犯者為僧為佛圖取若比丘使非親里比丘尼浣故衣若染若打尼薩耆波逸提五迦留陀夷與偷蘭難陀尼露形而坐欲心相視失不淨汙安陀會尼請浣之取不淨著口中及小便道後遂有身諸尼詰知其故白諸比丘轉白世尊結戒於是比丘不敢令親里尼浣染打故衣佛言聽使親里故衣者乃至一經身著若比丘令非親里尼浣故衣若染若打三捨墮語使浣染打彼浣染不打若浣打不染若染打不浣皆二捨墮一突吉羅語使浣染打彼竟不為三突吉羅使非親里沙彌尼式叉摩那浣染打故衣突吉羅使非親里尼浣染打新衣突吉羅餘四衆突吉羅不犯者若病若為僧為佛圖若借他衣浣染打若比丘從非親里居士若居士婦乞衣除餘時尼薩耆波逸提餘時者若比丘奪衣失衣燒衣漂衣是謂餘時六舍衛城有長者詣園遊觀回車詣祗桓見跋難陀禮敬聽法跋難陀說法開化勸令歡喜長者問何所須報言無所須長者固問報言止止即使所須不能見與長者復請乃言汝所著者可與我時長者身著貴價廣長白氎報言明日至我家當相與跋難陀固求不止長者不悅脫衣與之乘車著一衣入城守門者疑被賊劫長者具說因緣居士譏嫌故制於是比丘不敢從親里索衣佛言聽又衆比丘道行為賊所劫露形立祗桓門外諸比丘疑為尼犍子報優波離問知其故即借衣著見佛佛慰問具白因緣乃制裸形而行突吉羅當以軟草若樹葉覆形應往寺邊若先有長衣應取著若無者知友比丘長衣若僧中可分衣若臥具等以自覆形出外乞衣爾時聽從非親里乞衣比丘尼捨墮餘三衆突吉羅不犯者或為他乞他為己乞或不求而得若比丘奪衣失衣燒衣漂衣若非親里居士居士婦自恣請多與衣是比丘當知足受衣若過者尼薩耆波逸提七有衆比丘遇賊失衣來到祗洹時有優婆塞多持好衣隨諸比丘意取比丘自有三衣報云不取六羣語言何不取與我等若與餘人耶諸比丘遂取與之少欲者嫌責白佛故制若失一衣不應取若失二衣餘一衣若二重三重四重應擲作若僧伽梨若多羅僧若安陀會若三衣都失應知足受衣知足有二種在家人知足者隨白衣所與衣受之出家人知足者三衣也若居士自恣請多與衣若細若薄若不牢應取作二重三重四重當安緣當肩上應貼障垢膩處應安鈎鈕若有餘殘語居士言此餘殘衣裁作何等若檀越言我不以失衣故與我曹自與大德耳彼若欲受者便受比丘尼捨墮餘三衆突吉羅若比丘居士居士婦為比丘辦衣價買如是衣與某甲比丘是比丘先不受自恣請到居士家如是說善哉居士為我買如是衣與我為好故若得衣者尼薩耆波逸提八一比丘入舍衛城乞食至居士家聞夫婦共議辦跋難陀衣價還以報跋難陀彼問知其家明日往語言若欲與我衣者當如是廣大堅緻中我受持居士譏嫌故制是後居士自恣請比丘言大德須何等衣比丘意疑不答有居士欲為比丘作貢價衣彼知足欲須不如者亦疑不敢隨意索佛乃聽先受自恣請者衣價者若錢若金真珠琉璃貝玉瓔珞生像金求有二種一者求價乃至增一錢十六分之一二者求衣乃至增一線求得衣捨墮不得突吉羅比丘尼捨墮餘三衆突吉羅不犯者或為他求他為己求或不求自得若比丘二居士居士婦與比丘辦衣價持如是衣價買如是衣與某甲比丘是比丘先不受居士自恣請到二居士家作如是言善哉辦如是如是衣價與我共作一衣為好故若得衣者尼薩耆波逸提九緣起同前犯不犯亦如前說若比丘若王若大臣若婆羅門若居士居士婦遣使為比丘送衣價持如是衣價與某甲比丘彼使人至比丘所語比丘言大德今為汝故送是衣價受取是比丘應語彼使如是言我不應受此衣價我若須衣合時清淨當受彼使語比丘言大德有執事人不須衣比丘應語言有僧伽藍民若優婆塞此事比丘執事人常為諸比丘執事時彼使往至執事人所與衣價已還比丘所如是言大德所示某甲執事人我已與衣價大德知時往彼當得衣須衣比丘當往執事人所若二反三反作為憶念應語言我須衣若二反三反為作憶念若得衣者善若不得衣四反五反六反在前默然立若四反五反六反在前默然住得衣者善若不得衣過是求得衣者尼薩耆波逸提若不得衣從所得衣價處若自往若遣往使語言汝今遣使持衣價與某甲比丘是比丘竟不得衣汝還取莫使失此是時十羅閲城一大臣遣使持衣價與跋難陀跋難陀將此使入城持衣價與親舊長者掌之異時大臣問使人言跋難陀著不報言不著大臣更遣使索還衣價跋難陀即疾至長者家索衣時城中諸長者集會先有制不至者罰錢五百長者報言大德小待我赴會還跋難陀不允長者為作衣竟會坐已罷輸錢五百即與居士共相譏嫌故制憶念者若執事人在家在市及在作處往至彼處二反三反語言我今須衣與我作衣若二三反得衣者善若不得衣四五六反往前默然而立若執事人問言汝何緣在此立報言汝自知之若彼言我不知若有餘人知者當言彼人知之若比丘作一語破二反默然二語破四反默然三語破六反默然若過三反語索過六反默索得衣者捨墮比丘尼捨墮餘三衆突吉羅不犯者往語衣主彼言我不須即相布施是比丘應以時索軟語索方便索不得犯若比丘雜野蠶綿作新臥具尼薩耆波逸提十一六羣作新雜野蠶綿臥具至養蠶家索綿報言待蠶熟時六羣往待看𭨃繭蠶蛹作聲居士譏嫌故制雜者若毳若劫貝若拘遮羅若乳葉草若芻摩若麻若比丘自作成捨墮不成突吉羅教他作亦如是若為他作成不成突吉羅是中捨者應以斧斤細銼和泥塗壁塗埵尼及三衆俱突吉羅不犯者若得已成者若以斧斤銼斬和泥塗壁塗埵若比丘以新純黑羺羊毛作新臥具者尼薩耆波逸提十二諸梨車子多行邪淫以純黑羺羊毛作氎被體夜行使人不見六羣效而作之諸梨車語言我等為淫欲故汝等作此何所為耶比丘白佛故制純黑者或生黑或染黑自作成捨墮不成突吉羅教他作亦如是若為他作成不成突吉羅捨法如長衣中說不犯者若得已成者若割截壞若細薄揲作兩重若作褥作枕作方小坐具若作臥氎作襯鉢氎作剃力囊作帽作襪作鑷熱巾作裹革屣巾若比丘作新臥具應用二分純黑羊毛三分白四分牻若比丘不用二分黑三分白四分牻作新臥具者尼薩耆波逸提十三六羣作純白臥具居士譏嫌似王若大臣故制白者或生白或染白牻色者若頭上毛耳毛腳毛若餘牻色毛若作四十鉢羅羊毛臥具者二十鉢羅黑十鉢羅白十鉢羅牻若作三十鉢羅者十五鉢羅黑十五鉢羅半白半牻若作二十鉢羅十鉢羅黑五鉢羅白五鉢羅牻犯輕重同上餘四衆突吉羅不犯同上若比丘作新臥具持至六年若減六年不捨故更作新者除僧羯磨尼薩耆波逸提十四六羣嫌臥具或重或輕或薄或原不捨故更作新者藏積衆多故制後一比丘得乾痟病有因緣欲遊人間糞掃臥具重不堪持行諸比丘白佛佛聽僧與彼作白二羯磨犯輕重同上餘四衆突吉羅若比丘作新坐具當取故者縱廣一搩手帖著新者上壞色故若作新坐具不取故者縱廣一搩手帖著新者上用壞色故尼薩耆波逸提十五佛在給孤園時遣人請食諸佛常法諸比丘受請後遍行諸房見故坐具處處狼籍乃令比丘作新坐具取故者縱廣一搩手帖著新者上壞色故六羣不依佛誨故結此戒比丘作新坐具時若故坐具未壞未有穿孔當浣染治牽挽令舒裁取縱廣一搩手帖新者上若邊若中為壞色故犯輕重同上餘四衆突吉羅不犯者自無故者若他為己作若得已成者若純故者作若比丘道路行得羊毛若無人持得自持乃至三由旬若無人持自持過三由旬尼薩耆波逸提十六跋難陀道路行多得羊毛貫杖頭擔在道行居士嫌責為販賣羊毛故制比丘若在道行若在住處得羊毛須者應取若無人持自持至三由旬若有人持應語彼言我有此物當助我持乃至彼處比丘於此中間不得助持若助持突吉羅若令餘四衆持過三由旬突吉羅除羊毛若持餘拘遮羅若乳葉草芻摩若麻若廁羅婆尼持過三由旬者突吉羅若復擔餘物著杖頭行者亦突吉羅捨法如前餘四衆突吉羅不犯者若持至三由旬及減三由旬若有人與持者語使持至某處中間更不助擔若使尼及三衆將至三由旬地若擔毳裝毳繩若擔頭項腳毛若作帽作襪作鑷熱巾若裹革屣盡無犯若比丘使非親里比丘尼浣染擘羊毛者尼薩耆波逸提十七六羣取羊毛作坐具使大愛道浣染擘染色汙手往見世尊世尊問知其故訶責結戒是後比丘不敢使親里尼佛言聽若使非親里尼浣染擘各一捨墮使浣不浣等各一突吉羅使非親里沙彌尼式叉摩那者突吉羅餘四衆突吉羅不犯者若為病人若為衆僧為佛為塔若比丘自手捉錢若金銀若教人捉若置地受者尼薩耆波逸提十八跋難陀於大臣家持錢寄市肆上居士譏嫌故制錢者上有文像是中捨者若彼有信樂守園人若優婆塞當語言此是我所不應汝當知之若彼人取還與比丘者比丘當為彼人物故受敕淨人使掌之若得淨衣鉢針筒及尼師壇應貿易受持之若優婆塞取已與比丘淨衣鉢尼師壇針筒應取持之若彼取已不還者令餘比丘語言佛有教為淨故與汝汝當應還彼比丘物若餘比丘不語者當自往語佛有教為淨故與汝汝今可與僧與塔與和尚同和尚阿闍黎同阿闍黎及諸親舊知識若還本主何以故不欲使失彼信施故若不語彼知是看是者突吉羅比丘尼捨墮餘三衆突吉羅若比丘種種賣買寶物者尼薩耆波逸提十九跋難陀往市肆上以錢易錢持去居士譏嫌故制種種賣買者以成金易成金未成金成未成金易成銀未成銀成未成銀易錢以未成金易成金未成金乃至易錢以成未成金易成金乃至易錢銀錢作句亦如是說錢有八種金錢銀錢銅錢鐵錢木錢白蠟錢鉛鍚錢胡膠錢捨法同上比丘尼捨墮餘三衆突吉羅不犯者若以錢貿瓔珞具為佛法僧若以瓔珞具易錢為佛法僧若比丘種種販賣尼薩耆波逸提二十跋難陀於無住處村中持生薑易食而去舍利弗乞食至其家彼即索價又舍衛有外道得一貴價衣持至寺貿易跋難陀搗治故衣易之外道還所止園中有知者語言汝為他所欺即持衣至寺欲相還跋難陀不允外道譏嫌故制種種販賣者以時易時易非時易七日易盡形壽易波利迦羅餘四相易亦如是說賣者價直一錢數數上下增賣者價直一錢言直三錢重增賣者價直一錢言直五錢買亦如是若種種販賣得者捨墮不得者突吉羅捨法如前說不犯者與出家五衆人貿易自審定不相高下如市易法不與餘人貿易若使淨人貿易若悔者應還若以蘇易油以油易蘇若比丘畜長鉢不淨施得齊十日過者尼薩耆波逸提二十一六羣畜鉢好者持不好者置有居士詣房觀看譏嫌如陶師賣瓦肆故制時阿難得蘇摩國貴價鉢欲與迦葉而適不在恐犯此戒佛問迦葉幾時當還報言十日乃聽畜齊十日鉢有二種鐵鉢泥鉢大者三斗小者斗半如是應持應淨施若比丘一日得鉢乃至十日得鉢畜至十一日明相出十日中所得鉢盡捨墮若一日得鉢二日不得三日得鉢乃至十日得鉢至十一日明相出九日中所得鉢盡捨墮如是轉降至十日不得鉢作句如上如是二日不得八日得乃至九日不得一日得亦如是如是若淨施若遣與人若失若故壞若作非鉢若作親厚意取若忘去作句如上但以淨施等替不得字盡捨墮苦犯尼薩耆鉢不捨更貿餘鉢一捨墮一突吉羅捨法如長衣比丘尼捨墮餘三衆突吉羅不犯者十日內淨施若遣與人若奪失破漂等想若奪鉢失鉢燒鉢漂鉢取用若他與用若受寄鉢比丘已死遠行休道被賊獸等不遣與人不犯若比丘畜鉢減五綴不漏更求新鉢為好故尼薩耆波逸提彼比丘應往僧中捨展轉取最下鉢與之令持乃至破應持此是時二十二跋難陀鉢破向諸居士求鉢破一鉢得多鉢異時居士於一處集各自言得福無量以市鉢與跋難陀故即共譏嫌故制五綴者相去兩指間一綴若比丘鉢破減五綴不漏更求新鉢捨墮滿五綴不漏更求新鉢突吉羅是中捨者於此住處僧中捨應偏袒脫屣向上座禮胡跪合掌懺悔受懺人作白然後受懺此比丘鉢若貴價好者應留置取最下不如者與之白二羯磨與竟彼比丘鉢應作白已問僧作如是白大德僧聽若僧時到僧忍聽以此鉢次第問上座白如是作此白已當持與上座若上座欲取此鉢與之應取上座鉢與次座若與彼比丘彼比丘應取不應護衆僧故不取亦不應以此因緣受持最下鉢若受突吉羅若第二上座取此鉢應取第二上座鉢與第三上座若與彼比丘彼比丘應受不應護衆僧故不取不應以此因緣受持最下鉢若受突吉羅如是展轉乃至下座若持此比丘鉢還此比丘若持最下座鉢與此比丘作白二羯磨作如是白大德僧聽若僧時到僧忍聽僧今以此最下座鉢與某甲比丘受持乃至破應持白如是大德僧聽僧今以此最下座鉢與某甲比丘受持乃至破應持誰諸長老忍僧與此比丘鉢者默然誰不忍者說僧已忍與此比丘鉢竟僧忍默然故是事如是持彼比丘守護此鉢不得安著瓦石落處倚刀杖下及懸物下不得著道中石上若果樹下及不平地不得一手著兩鉢除指隔中央不得一手著兩鉢開戶除用心不得安著戶閾內戶扉下繩牀下木牀下繩木牀間及牀角頭除暫安著不得立蕩鉢乃至足令鉢破不應故壞故失不應作非鉢用僧中捨鉢竟不還教莫還俱突吉羅若作淨施遣與人故失壞作非鉢用數數用盡突吉羅比丘尼捨墮餘三衆突吉羅不犯者減五綴漏更求若為他索他為己索不求而得若施僧鉢時當次得若自有價買畜若比丘自乞縷線使非親里織師織作三衣者尼薩耆波逸提二十三跋難陀欲縫大衣至居士家處處求線得線多遂使織師織作衣自作繀自看織居士譏嫌故制自乞者在在處處自乞織師非親里與線者非親里犯織師非親里與線者或親里非親里非親里者犯織師非親里與線者是親里非親里者犯如是相織而成九句八句皆犯若比丘自乞線使織師織作衣者捨墮若看織若自織若自繀者盡突吉羅比丘尼捨墮餘三衆突吉羅不犯者織師與線二皆親里若自織作鉢囊屣囊針氈禪帶腰帶帽襪鑷熱巾裹革屣巾若比丘居士居士婦使織師為比丘織作衣彼比丘先不受自恣請便往織師所語言此衣為我作與我極好織令廣大堅緻我當少多與汝價是比丘與價乃至一食直若得衣尼薩耆波逸提二十四舍衛城有一居士出好線令織師為跋難陀織衣織師以語跋難陀即遣織廣大堅緻者彼言線少即至居士家更乞線復言價少即更許與價居士譏嫌故制是後比丘疑不敢答自恣請及索不如者佛言聽得衣捨墮不得者突吉羅比丘尼捨墮餘三衆突吉羅不犯者己為他他為己或不求而自得若比丘先與比丘衣後瞋恚若自奪若使人奪取還我衣來不與汝若比丘還衣彼取衣尼薩耆波逸提二十五難陀弟子善勸化跋難陀語言與我共行人間當與汝衣餘比丘語言汝以何事共跋難陀行彼癡人不知誦戒說戒布薩羯磨後彼比丘即不隨行跋難陀乃索前衣比丘不還即瞋恚強奪故制若奪取藏舉者捨墮不藏舉突吉羅若著樹牆籬橛龍牙杙衣架繩床木床小褥大褥機地敷等上若取離處捨墮不離處突吉羅比丘尼捨墮餘三衆突吉羅不犯者不瞋恚言我悔故不與汝衣還我衣來彼知其悔即便還之若餘人語言此比丘悔可還他衣若借他衣著他著無道理奪取若恐失壞若彼破戒破見破威儀被舉滅擯若為此事命難梵行難如是奪取不藏舉若比丘有病殘藥酥油生酥蜜石蜜齊七日得服若過七日服者尼薩耆波逸提二十六諸比丘秋月風病形體枯燥又生惡瘡佛聽服時非時五種藥時畢陵伽婆蹉在羅閲城多有所識亦多徒衆大得供養酥油生酥蜜石蜜諸弟子積聚藏舉處處流漫房舍臭穢見者譏嫌故制病者醫教服爾所藥也藥者酥油生酥蜜石蜜若比丘一日得藥畜二日乃至七日得藥畜至八日明相出七日所得盡捨墮若一日得藥畜二日不得三日乃至七日得藥畜至八日明相出六日所得盡捨墮如是轉降以不得字移至第七作句如是二日不得五日得乃至六日不得一日得作句如上如是若淨施若遣與人若失若故壞若作非藥若作親厚意取若忘去作句如上但以淨施等替不得字盡捨墮若犯捨墮藥不捨更貿易餘藥一捨墮一突吉羅捨法如前比丘尼捨墮餘三衆突吉羅不犯者若彼過七日藥及酥油塗戶響若蜜石蜜與守園人若至七日所捨與比丘食之若未滿七日還彼比丘彼當用塗腳或然燈若比丘春殘一月在當求雨浴衣半月應用浴若比丘過一月前求雨浴衣過半月前用浴尼薩耆波逸提二十七毗舍佉母請佛及僧時天大雨佛敕比丘雨中浴婢來白時到遙見比丘裸形浴疑是外道還白主母世尊既受其供母請與比丘雨浴衣佛聽之六羣即一切時常求雨浴衣不捨雨衣便持餘用現有雨衣猶裸形浴故制雨衣者比丘用雨中浴三月十六日應求雨浴衣四月一日應用若三月十六前求四月一日前用者捨墮餘四衆突吉羅不犯者若捨雨衣已乃更作餘用若著浴衣浴若無雨衣若作浴衣若浣染若舉處染若比丘十日未竟夏三月諸比丘得急施衣比丘知是急施衣當受受已乃至衣時應畜若過畜者尼薩耆波逸提二十八佛在毗蘭若夏安居竟婆羅門設供施衣佛聽比丘受夏衣六羣即一切時常乞衣安居未竟亦乞衣亦受衣又跋難陀在一處安居竟聞異處大得衣乃處處分得衣分佛聞訶責時舍衛有二大臣往征反叛自念未知得還與不欲為僧設食施衣諸比丘以安居未竟不敢受衣佛乃聽受而結此戒急施衣者受便得不受便失衣時者自恣竟不受迦絺那衣一月受迦絺那衣五月自恣十日在得急施衣應受應畜到衣時若九日在得急施衣應受應畜到衣時更增一目如是八日增二日七日增三日六日增四日乃至一日增九日皆如上說若過前過後捨墮比丘尼捨墮餘三衆突吉羅不犯者若奪衣失衣燒衣漂衣過前若奪想失想燒想漂想若路險難不通若多盜賊惡獸及大水漲若被王命難梵行難若受寄比丘已死出行賊劫獸害水漂過後若比丘夏三月竟後迦提一月滿在阿蘭若有疑恐怖處住比丘在如是處住三衣中欲留一一衣置舍內諸比丘有因緣離衣宿乃至六夜若過者尼薩耆波逸提二十九諸比丘安居竟後迦提一月在阿蘭若處住多有賊難皆趣祗桓聚住佛乃聽留一一衣置舍內六羣即留衣置舍內囑親友比丘已出行受囑者出衣曬之諸比丘白佛制戒阿蘭若處者去村五百弓遮摩羅國弓長四肘用中肘量有疑處者疑有賊盜恐怖者中有恐怖賊盜舍內者村聚也第七夜明相未出前不捨三衣不手捉衣不至擲石所及處住明相出捨墮除三衣離餘衣突吉羅不犯者奪想失想燒想漂想若船濟不通道路險難盜賊惡獸水漲繫閉命難梵行難若比丘知是僧物自求入己者尼薩耆波逸提三十舍衛國有一居士欲飯佛僧兼施好衣跋難陀語言施僧者多汝今食可施僧衣可施我居士聽之次日衆僧赴請居士見威儀具足發大聲悔不施衣比丘問知其故白佛結戒時諸比丘不知是僧物非僧物為許僧不許僧後乃知是僧物已許僧或作捨墮懺或慚愧佛言不知無犯僧物者為僧作已與僧已許僧物者衣鉢坐具針筒下至飲水器若比丘知是僧物自求入己者捨墮若物許僧轉與塔許塔轉與僧許四方僧轉與現在僧許現在僧轉與四方僧許比丘轉與比丘尼許比丘尼轉與比丘許異處轉與異處盡突吉羅若已許許想捨墮已許疑若未許許想未許疑突吉羅比丘尼捨墮餘三衆突吉羅不犯者若不知若已許作不許想若許少物勸令與多若許少人勸與多人欲許惡勸與好者或戲笑語獨處語眠中語錯說語
