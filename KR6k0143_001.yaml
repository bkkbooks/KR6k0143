body:
  text: 明菩薩戒武林比丘廣承輯録赤城比丘廣鎬嗣法比丘大真參訂古吳比丘智旭會補四波羅夷法第一舍利弗於閒靜處作是念何者等正覺修梵行法久住何者等正覺修梵行法不久住往問世尊佛言隨葉佛拘那含佛不為諸弟子廣說十二部經不結戒不說戒故法不久住如種種華散置案上風吹則散毗婆尸佛式佛拘留孫佛迦葉佛為諸弟子廣說經法亦結戒亦說戒故法得久住如以線貫種種華置案上雖為風吹而不分散爾時舍利弗即請世尊結戒說戒佛言且止佛自知時若有比丘犯有漏法然後結戒為斷彼有漏法故比丘若得利養若得名稱為人所識多聞多財業便生有漏法有漏法生當為結戒若比丘共比丘同戒若不還戒戒羸不自悔犯不淨行乃至共畜生是比丘波羅夷不共住一佛在毗舍離時迦蘭陀村須提那子饒財多寶持信牢固出家為道時世穀貴乞食難得須提那子將諸比丘詣迦蘭陀村乞食母勸捨道還家再三不允乃令與婦安子使種不斷便至園中三行不淨九月生男字為種子後亦出家成道時須提那行不淨來常懷愁憂同學問知白佛佛集僧訶責與諸比丘結戒集十句義一攝取於僧二令僧歡喜三令僧安樂四令未信者信五已信者令增長六難調者令調順七慚悔者得安樂八斷現在有漏九斷未來有漏十正法得久住以下一一戒皆用此十義故結不復重出結戒已有跋闍子比丘愁憂不樂淨行即還家共故二淫欲諸比丘白佛佛言比丘不樂淨行聽捨戒還家若復欲出家修淨行應度令出家受大戒故加不捨戒戒羸不自悔之言復有一乞食比丘依林中住與雌獼猴共行不淨比丘白佛故更加乃至共畜生之言若比丘者名字比丘相似比丘自稱比丘善來比丘乞求比丘著割截衣比丘破結使比丘受大戒白四羯磨如法成就得處所比丘是中比丘若受大戒白四羯磨如法成就得處所住比丘法中是比丘義共比丘者餘比丘受大戒白四羯磨乃至住比丘法中是共比丘義同戒者我為諸弟子結戒已寧死不犯其餘比丘一戒同戒等戒是名同戒不捨戒者顛狂捨戒心亂捨戒痛惱捨戒啞捨戒聾捨戒啞聾捨戒顛狂乃至啞聾人前捨戒中國人邊地人前捨戒邊地人中國人前捨戒不靜靜想靜不靜想捨戒戲笑捨戒若天龍夜叉餓鬼睡眠人死人無知人若自不語若語前人不解如是等不名捨戒云何捨戒若比丘不樂修梵行欲得還家厭比丘法常懷慚愧貪樂在家或優婆塞法沙彌法外道及外道弟子法非沙門非釋子法便作是語捨佛法僧捨和尚同和尚阿闍黎同阿闍黎捨諸梵行戒律學事受居家法我作淨人優婆塞沙彌外道外道弟子非沙門非釋子作是言我止不須佛佛于我何益離于佛所乃至學事復作餘語毀佛法僧乃至學事便讚歎家業乃至非沙門釋子以如是語了了說是名捨戒戒羸者有二有戒羸不捨戒若比丘不樂梵行乃至樂欲作非沙門非釋子作是言我念父母兄弟姊妹婦兒村落城邑園林浴池我欲捨佛法僧乃至學事欲受持家業乃至非釋子法是謂戒羸不捨戒若便捨戒是謂戒羸捨戒不淨行者是淫欲法不至共畜生者可行淫處者是也波羅夷者如人斷頭不可復起比丘亦然犯此法者不復成比丘不共住者有二共住同一羯磨同一說戒不得於是二事中住故名不共住三種行不淨行波羅夷人非人畜生復有五種人婦童女二形黃門男子三種婦人婦非人婦畜生婦三童女三二形三不男三男子犯人婦三處大小便及口非人婦畜生婦三童女三二形亦然人黃門二處非人畜生黃門三男子亦然比丘淫心向人婦三處初入犯不入不犯有隔有隔有隔無隔無隔有隔無隔無隔波羅夷餘婦女三童女三二形三處亦然三黃門三男子二處亦然若比丘淫意向人睡眠婦女死形未壞多未壞三處初入犯不入不犯有隔無隔等乃至男子亦然若為怨家將至人婦女所強持男根令入三處始入入已出時三時樂波羅夷二時樂一時樂亦然有隔無隔亦如是乃至男子亦如是若為怨家將至人睡眠婦女死形未壞多未壞覺樂亦如是有隔無隔亦如是乃至男子亦如是若怨家強捉比丘大便道中行不淨三時二時一時樂波羅夷乃至有隔無隔亦如上從道入道從道入非道從非道入道若限齊入盡入若語不語若以淫心乃至入如毛頭波羅夷方便不入偷蘭遮方便求欲行不淨行成者波羅夷不成者偷蘭遮若比丘教比丘行不淨行彼作教者偷蘭遮不作教者突吉羅尼教比丘行不淨行比丘作尼偷蘭遮不作尼突吉羅除比丘及尼餘衆相教作不作盡犯突吉羅若死尸半壞多分壞一切壞骨間穿地作孔摶泥作孔君持口中道想若疑如是一切偷蘭遮若道作道想若疑若道非道想波羅夷非道道想若疑偷蘭遮比丘尼波羅夷式叉摩那沙彌沙彌尼突吉羅滅𢷤不犯者若睡眠無所覺知不受樂無有淫意最初未制戒癡狂心亂痛惱所纏最初未制戒等以下諸戒皆同不重出若比丘若在村落若間靜處不與盜心取隨不與取法若為王王大臣所捉若殺若縛若驅出國汝是賊汝癡汝無所知是比丘波羅夷不共住二羅閲城有陶師子比丘字檀尼迦在靜處止一草屋入村乞食取薪人破屋持歸乃和泥作全成瓦屋取柴薪牛屎燒之屋成色赤如火佛制不得作赤色全成瓦屋敕諸比丘打破檀尼迦乃誑摩竭國守材人取王要材大臣白王王念不應以少材斷出家人命訶責放去諸臣不平居士譏嫌故制村有四種一周匝垣牆二周匝柵籬三籬牆不周四周匝屋舍間靜處者村外空靜地不與者他不捨盜者盜心取隨不與取者若五錢若直五錢王者得自在不屬人大臣者種種大臣輔佐王者有三種不與取波羅夷自手取看取遣人取復有三種取非己物想取非暫用取非同意取復有三種取他物他物想取若舉離本處復有三種取有主有主想取若舉離本處復有三種取他護他護想取若舉離本處復有四種不與取自手取看取遣人取若舉離本處復有四種取非己物想取不暫用取不同意取若舉離本處他物他物想取等有四種亦如是復有五種不與取自手取看取遣人取若重物舉離本處復有五種取非己物想取非暫用取非同意取若重物舉離本處復有五種取若他物他物想取若重物盜心舉離本處有主有主想取等有五種亦如是復有六種不與取自手取看取遣人取若重物盜心舉離本處非己物想取等有六種亦如是是為六種不與取犯波羅夷處者若地處若地上處若乘處若擔若虗空若樹上若村若阿蘭若處若田若處所若船若水處若私度關不輸稅若取他寄信物若取水楊枝樹果草木無足二足四足多足若同財業若共要若伺候若守護若邏要道是謂處地處者地中伏藏未發七寶生像金寶衣被若復餘地中所須之物屬主者若以盜心取五錢若過五錢若牽挽取若埋藏若舉離本處初離處波羅夷若方便欲舉而不舉偷蘭遮地上處亦如是乘處者象乘馬乘車乘步乘若復餘乘盡名為乘乘上若有七寶乃至舉離本處波羅夷方便不舉偷蘭遮若取乘從道至道從道至非道從非道至非道從坑中至岸上從岸上至坑中取離本處初離處波羅夷方便不取偷蘭遮下皆倣此擔處者頭擔肩擔背擔若抱若復餘擔空處者若風吹毳若劫貝拘遮羅若差羅波尼若芻摩若麻若綿若鉢耽嵐婆若頭頭羅若鴈鶴孔鸚鵡鸜鵒若復餘物上處者若舉物在樹上牆籬杙龍牙杙衣架繩牀木狀大小褥枕地敷如是等上村處如上阿蘭若處者村外有主空地田處者稻田麥田甘蔗田若復餘田處所者若家處所若市肆處若果園菜園池庭前舍後若復餘處船處者大船小船壺船一木船舫船櫓船龜形船鱉形船皮船浮瓠船果船懸船筏船若復餘船水處者若藏七寶等沉著水中若水獺魚等若優鉢羅等華及餘水中物不輸稅者比丘無輸稅法若白衣應輸稅物比丘以盜心為他過若擲關外若五錢若過五錢若埋藏舉若以辨詞言說誑惑若以呪術過波羅夷方便偷蘭遮取他寄信物者寄持信物作盜心取乃至舉離本處初離波羅夷方便偷蘭遮水者若大小瓮及餘水器若衆香水藥水揚枝者若一若兩若衆多若一把一束一抱一擔若香熏藥塗若盜心取五錢過五錢波羅夷方便偷蘭遮果木者諸草木叢林華果有主以盜心取波羅夷方便偷蘭遮無足者蛇魚及餘無足衆生二足者人非人鳥及餘二足衆生四足者象馬牛騾馲駝驢鹿及餘四足衆生多足者蜂周隆伽百足及餘多足衆生有主者以盜心取波羅夷方便偷蘭遮同財業者同事業得財物當共以盜心取波羅夷方便偷蘭遮共要者共他作要教言某時去某時來若穿牆取物若道路劫取若燒從彼得財來共以盜心取直五錢過五錢波羅夷方便偷蘭遮伺候者我當往觀村落城邑船渡處山谷處人所居處市肆處作坊處於彼所得一切當共以盜心取直五錢過五錢波羅夷方便偷蘭遮看道者我當看道若王軍來若賊軍來長者軍來當相告語若有所得一切當共波羅夷方便偷蘭遮方便求過五錢得過五錢得五錢波羅夷得減五錢不得偷蘭遮方便求五錢得過五錢得五錢波羅夷得減五錢不得偷蘭遮方便求減五錢得過五錢得五錢波羅夷得減五錢偷蘭遮不得突吉羅教人方便求過五錢得過五錢得五錢二俱波羅夷得減五錢不得二俱偷蘭遮方便教人求五錢得過五錢得五錢二俱波羅夷得減五錢不得二俱偷蘭遮方便教人求減五錢得過五錢得五錢取者波羅夷教者偷蘭遮得減五錢二俱偷蘭遮不得二俱突吉羅方便教人求五錢若過五錢受教者取異物或異處取他物取者波羅夷教者偷蘭遮若方便教人求五錢若過五錢受教謂使取物無盜心而取得五錢過五錢教者波羅夷受教者無犯若教人取物受教者謂殺盜取若取直五錢過五錢受教者波羅夷教者無犯有主有主想不與取五錢過五錢波羅夷有主疑無主有主想無主疑俱偷蘭遮有主有主想減五錢偷蘭遮有主疑無主有主想無主疑俱突吉羅比丘尼波羅夷餘三衆突吉羅滅擯不犯者與想取己有想冀掃想暫取想親厚意想若比丘故自手斷人命持刀與人歎譽死快勸死咄男子用此惡活為寧死不生作如是心思惟種種方便歎譽死快勸死是比丘波羅夷不共住三比丘習不淨觀厭患身命求刀欲自殺時有比丘字勿力伽難提手執利刀入婆裘園有一比丘語言大德斷我命來我以衣鉢與汝即受顧斷其命詣江洗刀尋生悔恨天魔立水勸讚悔心即滅復入園殺諸比丘至六十人故制人者從初識至後識而斷其命殺者自殺教殺遣使殺往來使殺重使殺展轉使殺求男子殺教求男子殺求持刀人殺教求持刀人殺若身現相若口說若身口俱現相若遣書若教遣使書若坑陷若倚發若與藥若安殺具自殺者若以手若瓦石刀仗及餘物而殺波羅夷方便偷蘭遮教殺者殺時自看教令前人擲水火中若山上推著谷底若使象踏殺若使惡獸噉或使蛇螫及餘種種教殺波羅夷方便偷蘭遮遣使殺者比丘遣使斷某甲命隨語斷命波羅夷方便偷蘭遮往來使者比丘遣使斷某甲命隨語便往欲殺未得而還即承前教復往殺波羅夷方便偷蘭遮重使者比丘遣使斷某甲命續復遣使乃至四五彼使往殺波羅夷方便偷蘭遮展轉使者比丘遣使斷某甲命彼復轉遣若百若千往斷其命波羅夷方便偷蘭遮求男子者是中誰知有如是人能用刀有方便久習學不怖不退能斷彼命即往斷命波羅夷方便偷蘭遮教求男子者教求如上男子亦如是求持刀者自求誰勇健能持刀令往斷命波羅夷方便偷蘭遮教求持刀亦如是身現相者身作相殺令墮水火乃至蛇螫彼因現身相